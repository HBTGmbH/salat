name: Build JAR and Docker image and publish to GHCR
on:
  push:
    branches: [ main ]
    tags: [ v* ]
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: hbtgmbh/salat

jobs:
  build:
    name: Build and publish
    runs-on: ubuntu-latest
    permissions:
      contents: read   # checkout the repository
      packages: write  # push the image to GHCR
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: Set up JDK 25
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287  # v5.3.0
        with:
          distribution: temurin
          java-version: '25'
          # Maven dependency cache. Accepted risk: publish steps are gated to tag
          # pushes, so a PR cannot poison a cache used by a release build.
          cache: maven  # zizmor: ignore[cache-poisoning]

      - name: Log in to Container Registry
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Unit Tests
        run: |
          ./mvnw clean test \
            --batch-mode \
            --no-transfer-progress

      - name: Build Docker image with Paketo
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        env:
          IMAGE_TAG: ${{ github.run_number }}
        run: |
          ./mvnw spring-boot:build-image \
            --batch-mode \
            --no-transfer-progress \
            -DskipTests \
            -Dsalat.image.name="$IMAGE_NAME" \
            -Dsalat.image.tag="$IMAGE_TAG"

      - name: Extract metadata
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9  # v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}},value=${{ github.ref_name }},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}

      - name: Push Docker image
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          SOURCE_IMAGE: ${{ env.IMAGE_NAME }}:${{ github.run_number }}
        run: |
          while IFS= read -r tag; do
            docker tag "$SOURCE_IMAGE" "$tag"
            docker push "$tag"
          done <<< "$TAGS"