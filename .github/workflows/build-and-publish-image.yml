name: Build JAR and Docker image and publish to GHCR
on:
  push:
    branches: [ main ]
    tags: [ v* ]
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: hbtgmbh/salat

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}},value=${{ github.ref_name }},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}

      - name: Build and push Docker image
        run: |
          ./mvnw spring-boot:build-image \
            --batch-mode \
            --no-transfer-progress \
            -DskipTests \
            -Dspring-boot.build-image.publish=true \
            -Dspring-boot.build-image.docker.registry=${{ env.REGISTRY }} \
            -Dspring-boot.build-image.docker.username=${{ github.actor }} \
            -Dspring-boot.build-image.docker.password=${{ secrets.GITHUB_TOKEN }} \
            -Dspring-boot.build-image.builder=paketobuildpacks/builder:full

      - name: Tag and push additional image tags
        run: |
          TAGS="${{ steps.meta.outputs.tags }}"
          SOURCE_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.run_number }}"
          
          while IFS= read -r tag; do
            docker tag "$SOURCE_IMAGE" "$tag"
            docker push "$tag"
          done <<< "$TAGS"