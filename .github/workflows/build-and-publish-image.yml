name: Build JAR and Docker image and publish to GHCR
on:
  push:
    branches: [ main ]
    tags: [ v* ]
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: hbtgmbh/salat

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Log in to Container Registry
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Unit Tests
        run: |
          ./mvnw clean test \
            --batch-mode \
            --no-transfer-progress

      - name: Build Docker image with Paketo
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: |
          ./mvnw spring-boot:build-image \
            --batch-mode \
            --no-transfer-progress \
            -DskipTests \
            -Dsalat.image.name=${{ env.IMAGE_NAME }} \
            -Dsalat.image.tag=${{ github.run_number }}

      - name: Extract metadata
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}},value=${{ github.ref_name }},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}

      - name: Push Docker image
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: |
          TAGS="${{ steps.meta.outputs.tags }}"
          while IFS= read -r tag; do
            docker tag ${{ env.IMAGE_NAME }}:${{ github.run_number }} "$tag"
            docker push "$tag"
          done <<< "$TAGS"