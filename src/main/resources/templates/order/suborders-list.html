<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}"
      th:with="section='orders',subSection='suborders',title=${pageTitle},sectionTitle=#{main.general.mainmenu.orders.text}">
<main layout:fragment="content">

  <!-- Filter card -->
  <div class="card mb-3">
    <div class="card-body">
      <form class="row g-2 align-items-end" method="get" th:action="@{/orders/suborders}">
        <div class="col-md-4">
          <label class="form-label" th:text="#{main.customerorder.order.text}">Customer Order</label>
          <select class="form-select tomselect" name="customerOrderId">
            <option value="-1" th:text="#{main.general.allorders.text}">All Orders</option>
            <option th:each="co : ${visibleCustomerOrders}"
                    th:value="${co.id}"
                    th:text="${co.sign + ' - ' + co.shortdescription}"
                    th:selected="${customerOrderId != null and customerOrderId == co.id}"></option>
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label" th:text="#{main.general.filter.text}">Filter</label>
          <input type="text" class="form-control" name="filter" th:value="${filter}" />
        </div>
        <div class="col-auto">
          <label class="form-check form-switch">
            <input class="form-check-input" type="checkbox" name="show" value="true" th:checked="${show}"/>
            <span class="form-check-label" th:text="#{main.general.showexpired.text}">Show expired</span>
          </label>
        </div>
        <div class="col-auto">
          <label class="form-check form-switch">
            <input class="form-check-input" type="checkbox" name="showActualHours" value="true" th:checked="${showActualHours}"/>
            <span class="form-check-label" th:text="#{main.general.showactualhoursflag.text}">Show actual hours</span>
          </label>
        </div>
        <div class="col-auto">
          <button class="btn btn-primary" type="submit"><i class="icon ti ti-filter m-0"></i></button>
        </div>
        <div class="col-auto ms-auto" th:if="${#authorization.expression('hasRole(''MANAGER'')')}">
          <a class="btn btn-success" th:href="@{/orders/suborders/create(customerOrderId=${customerOrderId != -1 ? customerOrderId : null})}">
            <i class="icon ti ti-plus"></i> <span th:text="#{main.general.button.createsuborder.text}">New Suborder</span>
          </a>
        </div>
      </form>
    </div>
  </div>

  <!-- Bulk action form wraps the table -->
  <form id="bulk-form" th:action="@{/orders/suborders/bulk-action}" method="post">
    <div class="card mb-3" th:if="${#authorization.expression('hasRole(''MANAGER'')')}">
      <div class="card-body">
        <div class="row g-2 align-items-end">
          <div class="col-auto">
            <select class="form-select" name="action">
              <option value="delete" th:text="#{main.general.button.delete.text}">Delete</option>
              <option value="altersubordercustomer" th:text="#{form.suborder.bulk.altersubordercustomer.text}">Change Suborder Customer</option>
            </select>
          </div>
          <div class="col-md-3">
            <input type="text" class="form-control" name="suborderCustomerValue"
                   th:placeholder="#{main.suborder.suborder_customer.text}" />
          </div>
          <div class="col-auto">
            <button type="submit" class="btn btn-warning"
                    th:onclick="|return confirm('#{main.general.confirmdelete.text}');|"
                    th:text="#{main.general.button.apply.text}">Apply</button>
          </div>
        </div>
      </div>
    </div>

    <div class="table-responsive card">
      <table class="table table-vcenter card-table">
        <thead>
          <tr>
            <th th:if="${#authorization.expression('hasRole(''MANAGER'')')}" class="w-1"></th>
            <th th:text="#{main.suborder.sign.text}">Sign</th>
            <th th:text="#{main.customerorder.order.text}">Customer Order</th>
            <th class="d-none d-sm-table-cell" th:text="#{main.customerorder.validfrom.text}">From / Until</th>
            <th class="d-none d-md-table-cell" th:text="#{main.suborder.invoice.text}">Invoice</th>
            <th class="d-none d-md-table-cell" th:text="#{main.general.debithours.text}">Debit Hours</th>
            <th class="d-none d-lg-table-cell" th:if="${showActualHours}" th:text="#{main.general.showactualhours.text}">Actual</th>
            <th class="d-none d-lg-table-cell" th:if="${showActualHours}" th:text="#{main.general.difference.text}">Diff</th>
            <th class="d-none d-lg-table-cell" th:text="#{main.general.flags.text}">Flags</th>
            <th th:if="${#authorization.expression('hasRole(''MANAGER'')')}"></th>
            <th th:if="${#authorization.expression('hasRole(''MANAGER'')')}"></th>
            <th th:if="${#authorization.expression('hasRole(''MANAGER'')')}"></th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="so : ${suborders}" th:classappend="${!so.currentlyValid} ? 'text-muted' : ''">
            <td th:if="${#authorization.expression('hasRole(''MANAGER'')')}">
              <input class="form-check-input" type="checkbox" name="suborderIds" th:value="${so.id}" />
            </td>
            <td>
              <div th:text="${so.completeOrderSign}">Sign</div>
              <small class="text-muted" th:text="${so.shortdescription}">Short description</small>
            </td>
            <td th:text="${so.customerorder.sign}">Customer Order</td>
            <td class="d-none d-sm-table-cell">
              <div th:text="${so.fromDate}">From</div>
              <small class="text-muted">
                <span th:if="${so.untilDate == null}" th:text="#{main.general.open.text}">open</span>
                <span th:if="${so.untilDate != null}" th:text="${so.untilDate}">Until</span>
              </small>
            </td>
            <td class="d-none d-md-table-cell">
              <span th:if="${so.invoice == 'Y'}" class="badge bg-success-lt" th:text="#{main.general.yes}">Yes</span>
              <span th:if="${so.invoice == 'N'}" class="badge bg-danger-lt" th:text="#{main.general.no}">No</span>
              <span th:if="${so.invoice == 'U'}" class="badge bg-secondary-lt">-</span>
            </td>
            <td class="d-none d-md-table-cell">
              <span th:if="${so.debithours != null and !so.debithours.zero}">
                <span th:text="${so.debithours}">0:00</span>
                <span th:if="${so.debithoursunit == 0}" th:text="' / ' + #{main.general.totaltime.text}"></span>
                <span th:if="${so.debithoursunit == 1}" th:text="' / ' + #{main.general.year.text}"></span>
                <span th:if="${so.debithoursunit == 12}" th:text="' / ' + #{main.general.month.text}"></span>
              </span>
            </td>
            <td class="d-none d-lg-table-cell" th:if="${showActualHours}">
              <span th:text="${so.duration}">0:00</span>
            </td>
            <td class="d-none d-lg-table-cell" th:if="${showActualHours}">
              <span th:if="${so.difference != null and so.difference.negative}" class="text-danger" th:text="${so.difference}">0:00</span>
              <span th:if="${so.difference != null and !so.difference.negative}" th:text="${so.difference}">0:00</span>
            </td>
            <td class="d-none d-lg-table-cell">
              <span th:if="${so.standard}" class="badge bg-blue-lt" th:text="#{main.suborder.standard.short}">S</span>
              <span th:if="${so.commentnecessary}" class="badge bg-yellow-lt" th:text="#{main.suborder.commentnecessary.short}">C</span>
              <span th:if="${so.fixedPrice}" class="badge bg-green-lt" th:text="#{main.suborder.fixedprice.short}">FP</span>
              <span th:if="${so.trainingFlag}" class="badge bg-purple-lt" th:text="#{main.suborder.training.short}">T</span>
              <span th:if="${so.hide}" class="badge bg-red-lt" th:text="#{main.general.hide}">H</span>
            </td>
            <td th:if="${#authorization.expression('hasRole(''MANAGER'')')}">
              <a class="btn btn-outline-primary btn-sm" th:href="@{'/orders/suborders/' + ${so.id} + '/edit'}">
                <i class="icon ti ti-pencil m-0"></i>
              </a>
            </td>
            <td th:if="${#authorization.expression('hasRole(''MANAGER'')')}">
              <form th:action="@{'/orders/suborders/' + ${so.id} + '/copy'}" method="post">
                <button type="submit" class="btn btn-outline-secondary btn-sm" title="Copy">
                  <i class="icon ti ti-copy m-0"></i>
                </button>
              </form>
            </td>
            <td th:if="${#authorization.expression('hasRole(''MANAGER'')')}">
              <form th:action="@{'/orders/suborders/' + ${so.id} + '/delete'}" method="post"
                    th:onsubmit="|return confirm('#{main.general.confirmdelete.text}');|">
                <button type="submit" class="btn btn-outline-danger btn-sm">
                  <i class="icon ti ti-trash m-0"></i>
                </button>
              </form>
            </td>
          </tr>
          <tr th:if="${#lists.isEmpty(suborders)}">
            <td colspan="12" class="text-center text-muted py-4" th:text="#{main.general.norecords.text}">No records found</td>
          </tr>
        </tbody>
      </table>
    </div>
  </form>

  <!-- Hide outdated button -->
  <div class="mt-3" th:if="${#authorization.expression('hasRole(''MANAGER'')')}">
    <form th:action="@{/orders/suborders/hide-outdated}" method="post">
      <input type="hidden" name="customerOrderId" th:value="${customerOrderId}" />
      <input type="hidden" name="filter" th:if="${filter}" th:value="${filter}" />
      <input type="hidden" name="show" th:if="${show}" th:value="${show}" />
      <button type="submit" class="btn btn-outline-warning btn-sm"
              th:text="#{main.suborder.button.hideoutdated.text}">Hide outdated</button>
    </form>
  </div>

</main>
</html>
