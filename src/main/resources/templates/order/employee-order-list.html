<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}"
      th:with="section='orders',subSection='employeeorders',title=${pageTitle},sectionTitle=#{main.general.mainmenu.orders.text}">
<main layout:fragment="content">

  <div th:replace="~{fragments/filter-card :: filterCard(
      params=${#fcard.htmx('eo', '#results-container')},
      formAction=@{/orders/employeeorders},
      primaryFilters=~{::primaryFilters},
      advancedFilters=~{::advancedFilters}
  )}">
    <th:block th:fragment="primaryFilters">
      <div class="row g-2 align-items-end">
        <div class="col-md-8">
          <label class="form-label" th:text="#{main.employeecontract.employee.text}">Employee</label>
          <select class="form-select tomselect" name="employeeContractId">
            <option value="" th:text="#{main.employee.select.please}">--- Please select ---</option>
            <option th:each="ec : ${employeecontracts}"
                    th:value="${ec.id}"
                    th:text="${ec.employee.name + ' | ' + ec.employee.sign + '  (' + ec.timeString + (ec.openEnd ? ' &infin;' : '') + ')'}"
                    th:selected="${employeeContractId != null and employeeContractId == ec.id}"></option>
          </select>
        </div>
        <div class="col-md-auto ms-auto" th:if="${#authorization.expression('hasRole(''MANAGER'')')}">
          <a id="create-button" class="btn btn-success" th:href="@{/orders/employeeorders/create(orderId=${orderId}, employeeContractId=${employeeContractId}, customerId=${customerId}, suborderId=${suborderId})}">
            <i class="icon ti ti-file-plus"></i>
            <span th:text="#{main.general.button.createemployeeorder.text}">New Employee Order</span>
          </a>
        </div>
      </div>
      <div class="row g-2 mt-2">
        <div class="col-md-4">
          <label class="form-label" th:text="#{main.customerorder.customer.text}">Customer</label>
          <select class="form-select tomselect" name="customerId" th:attr="data-value=${customerId}">
            <option value="" th:text="#{main.customer.select.please}">--- Please select ---</option>
            <option th:each="c : ${customers}"
                    th:value="${c.id}"
                    th:text="${c.shortname}"
                    th:selected="${customerId != null and customerId == c.id}"></option>
          </select>
        </div>
        <div class="col-md-4" id="order-select-wrapper">
          <label class="form-label" th:text="#{main.customerorder.order.text}">Order</label>
          <select class="form-select tomselect" name="orderId" th:attr="data-value=${orderId}">
            <option value="" th:text="#{main.customerorder.select.please}">--- Please select ---</option>
            <option th:each="co : ${orders}"
                    th:value="${co.id}"
                    th:text="${co.sign + ' - ' + co.shortdescription}"
                    th:selected="${orderId != null and orderId == co.id}"></option>
          </select>
        </div>
      </div>
    </th:block>
    <th:block th:fragment="advancedFilters">
      <div class="row g-2 align-items-end">
        <div class="col-md-4">
          <input type="text" class="form-control" name="filter" th:value="${filter}"
                 th:placeholder="#{main.general.filter.text}" />
        </div>
        <div class="col-auto">
          <button class="btn btn-primary" type="submit">
            <i class="icon ti ti-filter m-0"></i>
          </button>
        </div>
      </div>
      <div class="row g-2 align-items-end mt-2">
        <div class="col-md-4" id="suborder-select-wrapper">
          <label class="form-label" th:text="#{main.employeeorder.suborder.text}">Suborder</label>
          <select class="form-select tomselect" name="suborderId" th:attr="data-value=${suborderId}">
            <option value="" th:text="#{main.suborder.select.please}">--- Please select ---</option>
            <option th:each="so : ${suborders}"
                    th:value="${so.id}"
                    th:text="${so.completeOrderSign + ' - ' + so.shortdescription}"
                    th:selected="${suborderId != null and suborderId == so.id}"></option>
          </select>
        </div>
      </div>
      <div class="row g-2 align-items-end mt-2">
        <div class="col-auto ms-2">
          <label class="form-check form-switch">
            <input class="form-check-input" type="checkbox" name="show" value="true" th:checked="${show}"/>
            <span class="form-check-label" th:text="#{main.general.showexpired.text}">Show expired</span>
          </label>
        </div>
        <div class="col-auto">
          <label class="form-check form-switch">
            <input class="form-check-input" type="checkbox" name="showHidden" value="true" th:checked="${showHidden}"/>
            <span class="form-check-label" th:text="#{main.general.showhidden.text}">Show hidden</span>
          </label>
        </div>
        <div class="col-auto">
          <label class="form-check form-switch">
            <input class="form-check-input" type="checkbox" name="showActualHours" value="true" th:checked="${showActualHours}"/>
            <span class="form-check-label" th:text="#{main.general.showactualhoursflag.text}">Show actual hours</span>
          </label>
        </div>
      </div>
    </th:block>
  </div>
  <div th:replace="~{fragments/filter-card :: filterCardJs}"></div>

  <!-- Table -->
  <div id="results-container" th:fragment="results">
  <div class="table-responsive card">
    <table class="table table-vcenter card-table">
      <thead>
        <tr>
          <th th:text="#{main.employeeorder.employee.text}">Employee</th>
          <th class="d-none d-md-table-cell" th:text="#{main.customerorder.customer.text}">Customer</th>
          <th th:text="#{main.employeeorder.suborder.text}">Suborder</th>
          <th class="d-none d-md-table-cell" th:text="#{main.employeeorder.valid.text}">Valid</th>
          <th class="d-none d-md-table-cell" th:text="#{main.general.debithours.text}">Debit Hours</th>
          <th class="d-none d-md-table-cell" th:if="${showActualHoursToggle}" th:text="#{main.general.showactualhours.text}">Actual</th>
          <th class="d-none d-md-table-cell" th:if="${showActualHoursToggle}" th:text="#{main.general.difference.text}">Diff</th>
          <th class="d-none d-lg-table-cell" th:text="#{main.general.flags.text}">Flags</th>
          <th th:if="${#authorization.expression('hasRole(''MANAGER'')')}" class="w-1"></th>
          <th th:if="${#authorization.expression('hasRole(''MANAGER'')')}" class="w-1"></th>
        </tr>
      </thead>
      <tbody>
        <tr th:if="${#lists.isEmpty(employeeorders)}">
          <td colspan="9" class="text-center text-muted py-4" th:text="#{main.general.norecords.text}">No records found</td>
        </tr>
        <tr th:each="eo : ${employeeorders}" th:classappend="${!eo.currentlyValid} ? 'table-danger' : ((!eo.fitsToSuperiorObjects) ? 'table-warning' : '')">
          <td th:text="${eo.employeeName}"></td>
          <td class="d-none d-md-table-cell">
            <div th:text="${eo.customerShortName}" class="text-nowrap">Customer</div>
          </td>
          <td>
            <div th:text="${eo.completeOrderSign}" class="text-nowrap">Suborder</div>
            <small class="text-muted" th:text="${eo.completeOrderDescription}">Suborder description</small>
          </td>
          <td th:replace="~{fragments/master-table :: colDateRange(fromDate=${eo.fromDate}, untilDate=${eo.untilDate}, responsive='md')}"></td>
          <td class="d-none d-md-table-cell">
            <span th:if="${eo.debithours != null and !eo.debithours.zero}">
              <span th:text="${@durationUtils.format(eo.debithours)}">0:00</span>
              <span th:if="${eo.debithoursunit == 1}" class="badge bg-warning-lt" th:title="#{main.general.year.text}"><i class="icon bi-arrow-clockwise"></i></span>
              <span th:if="${eo.debithoursunit == 12}" class="badge bg-warning-lt" th:title="#{main.general.month.text}"><i class="icon bi-calendar-date"></i></span>
            </span>
          </td>
          <td class="d-none d-md-table-cell" th:if="${showActualHoursToggle}">
            <span th:text="${@durationUtils.format(eo.duration)}">0:00</span>
          </td>
          <td class="d-none d-md-table-cell" th:if="${showActualHoursToggle}">
            <span th:if="${eo.difference != null and eo.difference.negative}" class="text-danger"
                  th:text="${@durationUtils.format(eo.difference)}">0:00</span>
            <span th:if="${eo.difference != null and !eo.difference.negative}"
                  th:text="${@durationUtils.format(eo.difference)}">0:00</span>
          </td>
          <td class="d-none d-lg-table-cell">
            <span th:if="${eo.hidden}" class="badge bg-secondary-lt"><i class="bi bi-eye-slash"></i></span>
          </td>
          <td th:if="${#authorization.expression('hasRole(''MANAGER'')')}">
            <a th:href="@{/orders/employeeorders/edit(id=${eo.id})}" class="btn btn-outline-primary">
              <i class="icon ti ti-pencil m-0"></i>
            </a>
          </td>
          <td th:if="${#authorization.expression('hasRole(''MANAGER'')')}">
            <form th:action="@{/orders/employeeorders/{id}/delete(id=${eo.id})}" method="post"
                  th:onsubmit="|return confirm('#{main.general.confirmdelete.text}')|">
              <button type="submit" class="btn btn-outline-danger">
                <i class="icon ti ti-trash m-0"></i>
              </button>
            </form>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
  <div th:if="${htmxRequest}">
    <div id="order-select-wrapper" class="col-md-4" hx-swap-oob="true">
      <label class="form-label" th:text="#{main.customerorder.order.text}">Order</label>
      <select class="form-select tomselect" name="orderId" th:attr="data-value=${orderId}" onchange="form.requestSubmit()">
        <option value="" th:text="#{main.customerorder.select.please}">--- Please select ---</option>
        <option th:each="co : ${orders}"
                th:value="${co.id}"
                th:text="${co.sign + ' - ' + co.shortdescription}"
                th:selected="${orderId != null and orderId == co.id}"></option>
      </select>
    </div>
    <div id="suborder-select-wrapper" class="col-md-4" hx-swap-oob="true">
      <label class="form-label" th:text="#{main.employeeorder.suborder.text}">Suborder</label>
      <select class="form-select tomselect" name="suborderId" th:attr="data-value=${suborderId}" onchange="form.requestSubmit()">
        <option value="" th:text="#{main.suborder.select.please}">--- Please select ---</option>
        <option th:each="so : ${suborders}"
                th:value="${so.id}"
                th:text="${so.completeOrderSign + ' - ' + so.shortdescription}"
                th:selected="${suborderId != null and suborderId == so.id}"></option>
      </select>
    </div>
    <a id="create-button"
       class="btn btn-success"
       th:href="@{/orders/employeeorders/create(orderId=${orderId}, employeeContractId=${employeeContractId}, customerId=${customerId}, suborderId=${suborderId})}"
       hx-swap-oob="true">
      <i class="icon ti ti-file-plus"></i>
      <span th:text="#{main.general.button.createemployeeorder.text}">New Employee Order</span>
    </a>
  </div>
  </div>

</main>
</html>
