<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}"
      th:with="section='orders',subSection='suborders',title=${pageTitle},sectionTitle=#{main.general.mainmenu.orders.text}">
<main layout:fragment="content">

  <div th:replace="~{fragments/filter-card :: filterCard(
      params=${@filterCardParams.htmx('so', '#results-container')},
      formAction=@{/orders/suborders},
      primaryFilters=~{::primaryFilters},
      advancedFilters=~{::advancedFilters}
  )}">
    <th:block th:fragment="primaryFilters">
      <div class="row g-2 align-items-end">
        <div class="col-md-4">
          <label class="form-label" th:text="#{main.customerorder.customer.text}">Customer</label>
          <select class="form-select tomselect" name="customerId" th:attr="data-value=${customerId}">
            <option value="" th:text="#{main.customer.select.please}">--- Please select ---</option>
            <option th:each="c : ${customers}"
                    th:value="${c.id}"
                    th:text="${c.shortname}"
                    th:selected="${customerId != null and customerId == c.id}"></option>
          </select>
        </div>
        <div class="col-md-4" id="order-select-wrapper">
          <label class="form-label" th:text="#{main.suborder.customerorder.text}">Order</label>
          <select class="form-select tomselect" name="customerOrderId">
            <option value="" th:text="#{main.customerorder.select.please}">--- Please select ---</option>
            <option th:each="co : ${visibleCustomerOrders}"
                    th:value="${co.id}"
                    th:text="${co.sign + ' - ' + co.shortdescription}"
                    th:selected="${customerOrderId != null and customerOrderId == co.id}"></option>
          </select>
        </div>
        <div class="col-md-auto ms-auto" th:if="${#authorization.expression('hasRole(''MANAGER'')')}">
          <a id="create-button" class="btn btn-success" th:href="@{/orders/suborders/create(customerOrderId=${customerOrderId}, customerId=${customerId})}">
            <i class="icon ti ti-subtask"></i> <span th:text="#{main.general.button.createsuborder.text}">New Suborder</span>
          </a>
        </div>
      </div>
    </th:block>
    <th:block th:fragment="advancedFilters">
      <div class="row g-2 align-items-end">
        <div class="col-md-4">
          <input type="text" class="form-control" name="filter" th:value="${filter}" />
        </div>
        <div class="col-auto">
          <button class="btn btn-primary" type="submit" title="Apply text filter">
            <i class="icon ti ti-filter m-0"></i>
          </button>
        </div>
      </div>
      <div class="row g-2 align-items-end mt-3">
        <div class="col-auto ms-2">
          <label class="form-check form-switch">
            <input class="form-check-input" type="checkbox" name="show" value="true" th:checked="${show}"/>
            <span class="form-check-label" th:text="#{main.general.showexpired.text}">Show expired</span>
          </label>
        </div>
        <div class="col-auto">
          <label class="form-check form-switch">
            <input class="form-check-input" type="checkbox" name="showHidden" value="true" th:checked="${showHidden}"/>
            <span class="form-check-label" th:text="#{main.general.showhidden.text}">Show hidden</span>
          </label>
        </div>
        <div class="col-auto">
          <label class="form-check form-switch">
            <input class="form-check-input" type="checkbox" name="showActualHours" value="true" th:checked="${showActualHours}"/>
            <span class="form-check-label" th:text="#{main.general.showactualhoursflag.text}">Show actual hours</span>
          </label>
        </div>
      </div>
    </th:block>
  </div>
  <div th:replace="~{fragments/filter-card :: filterCardJs}"></div>

  <div id="results-container" th:fragment="results">
  <div class="table-responsive card">
    <table class="table table-vcenter card-table">
      <thead>
        <tr>
          <th class="d-none d-sm-table-cell" th:text="#{main.customerorder.customer.text}">Customer</th>
          <th class="d-none d-sm-table-cell" th:text="#{main.customerorder.order.text}">Customer Order</th>
          <th th:text="#{main.suborder.suborder.text}">Sub Order</th>
          <th class="d-none d-sm-table-cell" th:text="#{main.customerorder.valid.text}">Valid</th>
          <th class="d-none d-md-table-cell" th:text="#{main.general.debithours.text}">Debit Hours</th>
          <th class="d-none d-lg-table-cell" th:if="${showActualHours}" th:text="#{main.general.showactualhours.text}">Actual</th>
          <th class="d-none d-lg-table-cell" th:if="${showActualHours}" th:text="#{main.general.difference.text}">Diff</th>
          <th class="d-none d-lg-table-cell" th:text="#{main.general.flags.text}">Flags</th>
          <th th:if="${#authorization.expression('hasRole(''MANAGER'')')}" class="w-1"></th>
          <th th:if="${#authorization.expression('hasRole(''MANAGER'')')}" class="w-1"></th>
          <th th:if="${#authorization.expression('hasRole(''MANAGER'')')}" class="w-1"></th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="so : ${suborders}" th:classappend="${!so.currentlyValid} ? 'table-danger' : ''">
          <td class="d-none d-sm-table-cell" th:text="${so.customerorder.customer.shortname}">Customer</td>
          <td class="d-none d-sm-table-cell">
            <div th:text="${so.customerorder.sign}">Customer Order</div>
            <small class="text-muted" th:text="${so.customerorder.shortdescription}">Customer order short description</small>
          </td>
          <td>
            <div th:text="${so.completeOrderSign}">Suborder Sign</div>
            <small class="text-muted" th:text="${so.shortdescription}">short description</small>
          </td>
          <td th:replace="~{fragments/master-table :: colDateRange(fromDate=${so.fromDate}, untilDate=${so.untilDate}, responsive='sm')}"></td>
          <td class="d-none d-md-table-cell">
            <span th:if="${so.debithours != null and !so.debithours.zero}">
              <span th:text="${@durationUtils.format(so.debithours)}">0:00</span>
              <span th:if="${so.debithoursunit == 0}" th:text="' / ' + #{main.general.totaltime.text}"></span>
              <span th:if="${so.debithoursunit == 1}" th:text="' / ' + #{main.general.year.text}"></span>
              <span th:if="${so.debithoursunit == 12}" th:text="' / ' + #{main.general.month.text}"></span>
            </span>
          </td>
          <td class="d-none d-lg-table-cell" th:if="${showActualHours}">
            <div th:if="${so.invoiceString == 'Y'}">
              <span class="badge bg-success-lt me-1" th:title="#{main.general.showactualhours.invoiceable.text}"><i class="bi-file-earmark-check"></i></span>
              <span th:text="${@durationUtils.format(so.duration)}"></span>
            </div>
            <div class="mt-1" th:if="${so.invoiceString == 'N' or so.durationNotInvoiceable.positive}">
              <span class="badge bg-danger-lt me-1" th:title="#{main.general.showactualhours.not.invoiceable.text}"><i class="bi-file-earmark-x"></i></span>
              <small class="text-muted" th:text="${@durationUtils.format(so.durationNotInvoiceable)}"></small>
            </div>
          </td>
          <td class="d-none d-lg-table-cell" th:if="${showActualHours}">
            <span th:if="${so.difference != null and so.difference.negative}" class="text-danger" th:text="${@durationUtils.format(so.difference)}">0:00</span>
            <span th:if="${so.difference != null and !so.difference.negative}" th:text="${@durationUtils.format(so.difference)}">0:00</span>
          </td>
          <td class="d-none d-lg-table-cell">
            <span th:if="${so.invoiceString == 'Y'}" class="badge bg-success-lt" th:title="#{main.suborder.invoice.text}"><i class="bi-cash-stack"></i></span>
            <span th:if="${so.standard}" class="badge bg-warning-lt" th:title="#{main.suborder.standard.text}"><i class="bi-bookmark-star-fill"></i></span>
            <span th:if="${so.commentnecessary}" class="badge bg-danger-lt" th:title="#{main.suborder.commentnecessary.text}"><i class="bi bi-chat-square-text"></i></span>
            <span th:if="${so.fixedPrice}" class="badge bg-primary-lt" th:title="#{main.suborder.fixedprice.text}"><i class="bi bi-tag-fill"></i></span>
            <span th:if="${so.trainingFlag}" class="badge bg-purple-lt" th:title="#{main.suborder.trainingflag.text}"><i class="bi bi-mortarboard"></i></span>
            <span th:if="${so.hide}" class="badge bg-secondary-lt"><i class="bi bi-eye-slash"></i></span>
          </td>
          <td th:if="${#authorization.expression('hasRole(''MANAGER'')')}">
            <a class="btn btn-outline-primary" th:href="@{'/orders/suborders/' + ${so.id} + '/edit'}">
              <i class="icon ti ti-pencil m-0"></i>
            </a>
          </td>
          <td th:if="${#authorization.expression('hasRole(''MANAGER'')')}">
            <form th:action="@{'/orders/suborders/' + ${so.id} + '/copy'}" method="post">
              <button type="submit" class="btn btn-outline-secondary" title="Copy">
                <i class="icon ti ti-copy m-0"></i>
              </button>
            </form>
          </td>
          <td th:if="${#authorization.expression('hasRole(''MANAGER'')')}">
            <form th:action="@{'/orders/suborders/' + ${so.id} + '/delete'}" method="post"
                  th:onsubmit="|return confirm('#{main.general.confirmdelete.text}');|">
              <button type="submit" class="btn btn-outline-danger">
                <i class="icon ti ti-trash m-0"></i>
              </button>
            </form>
          </td>
        </tr>
        <tr th:if="${#lists.isEmpty(suborders)}">
          <td colspan="12" class="text-center text-muted py-4" th:text="#{main.general.norecords.text}">No records found</td>
        </tr>
      </tbody>
    </table>
  </div>
  <div th:if="${htmxRequest}">
    <div id="order-select-wrapper" class="col-md-4" hx-swap-oob="true">
      <label class="form-label" th:text="#{main.suborder.customerorder.text}">Order</label>
      <select class="form-select tomselect" name="customerOrderId" onchange="form.requestSubmit()">
        <option value="" th:text="#{main.customerorder.select.please}">--- Please select ---</option>
        <option th:each="co : ${visibleCustomerOrders}"
                th:value="${co.id}"
                th:text="${co.sign + ' - ' + co.shortdescription}"
                th:selected="${customerOrderId != null and customerOrderId == co.id}"></option>
      </select>
    </div>
    <a id="create-button"
       class="btn btn-success"
       th:href="@{/orders/suborders/create(customerOrderId=${customerOrderId}, customerId=${customerId})}"
       hx-swap-oob="true">
      <i class="icon ti ti-subtask"></i> <span th:text="#{main.general.button.createsuborder.text}">New Suborder</span>
    </a>
  </div>
  </div>

</main>
</html>
