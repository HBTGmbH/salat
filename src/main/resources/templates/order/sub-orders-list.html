<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}"
      th:with="section='orders',subSection='suborders',title=${pageTitle},sectionTitle=#{main.general.mainmenu.orders.text}">
<main layout:fragment="content">

  <!-- Filter card -->
  <div class="card mb-3" th:with="hasAdvancedFilter=${(filter != null and !#strings.isEmpty(filter)) or show == true or showActualHours == true}">
    <div class="card-body">
      <form method="get" th:action="@{/orders/suborders}" data-filter-form="so">

        <!-- Primary filter row -->
        <div class="row g-2 align-items-center">
          <div class="col">
            <select class="form-select tomselect" name="customerId" th:attr="data-value=${customerId}">
              <option value="-1" th:text="#{main.general.allcustomers.text}">All Customers</option>
              <option th:each="c : ${customers}"
                      th:value="${c.id}"
                      th:text="${c.shortname}"
                      th:selected="${customerId != null and customerId == c.id}"></option>
            </select>
          </div>
          <div class="col">
            <select class="form-select tomselect" name="customerOrderId">
              <option value="-1" th:text="#{main.general.allorders.text}">All Orders</option>
              <option th:each="co : ${visibleCustomerOrders}"
                      th:value="${co.id}"
                      th:text="${co.sign + ' - ' + co.shortdescription}"
                      th:selected="${customerOrderId != null and customerOrderId == co.id}"></option>
            </select>
          </div>
          <div class="col-auto ms-auto" th:if="${#authorization.expression('hasRole(''MANAGER'')')}">
            <a class="btn btn-success" th:href="@{/orders/suborders/create(customerOrderId=${customerOrderId != -1 ? customerOrderId : null}, customerId=${customerId != null and customerId > 0 ? customerId : null})}">
              <i class="icon ti ti-subtask"></i> <span th:text="#{main.general.button.createsuborder.text}">New Suborder</span>
            </a>
          </div>
        </div>

        <!-- Advanced toggle (below main filter) -->
        <div class="mt-2">
          <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" id="advanced-toggle" role="switch">
            <label class="form-check-label text-muted small" for="advanced-toggle" th:text="#{main.general.filter.advanced.text}">Erweiterter Filter</label>
          </div>
        </div>

        <!-- Hidden collapse trigger (Bootstrap data-API handles animation without needing window.bootstrap) -->
        <button type="button" class="d-none" id="advanced-collapse-trigger"
                data-bs-toggle="collapse" data-bs-target="#advanced-filters"></button>

        <!-- Advanced filters -->
        <div class="collapse mt-3" id="advanced-filters"
             th:attr="data-server-open=${hasAdvancedFilter}">
          <div class="row g-2 align-items-end">
            <div class="col-md-4">
              <input type="text" class="form-control" name="filter" th:value="${filter}" />
            </div>
            <div class="col-auto">
              <button class="btn btn-primary" type="submit" title="Apply text filter">
                <i class="icon ti ti-filter m-0"></i>
              </button>
            </div>
          </div>
          <div class="row g-2 align-items-end mt-3">
            <div class="col-auto ms-2">
              <label class="form-check form-switch">
                <input class="form-check-input" type="checkbox" name="show" value="true" th:checked="${show}"/>
                <span class="form-check-label" th:text="#{main.general.showexpired.text}">Show expired</span>
              </label>
            </div>
            <div class="col-auto">
              <label class="form-check form-switch">
                <input class="form-check-input" type="checkbox" name="showActualHours" value="true" th:checked="${showActualHours}"/>
                <span class="form-check-label" th:text="#{main.general.showactualhoursflag.text}">Show actual hours</span>
              </label>
            </div>
          </div>
        </div>

      </form>
    </div>
  </div>
  <div class="table-responsive card">
    <table class="table table-vcenter card-table">
      <thead>
        <tr>
          <th th:text="#{main.customerorder.order.text}">Customer Order</th>
          <th th:text="#{main.suborder.sign.text}">Sign</th>
          <th class="d-none d-md-table-cell" th:text="#{main.customerorder.shortdescription.text}">Short description</th>
          <th class="d-none d-sm-table-cell" th:text="#{main.customerorder.valid.text}">Valid</th>
          <th class="d-none d-md-table-cell" th:text="#{main.general.debithours.text}">Debit Hours</th>
          <th class="d-none d-lg-table-cell" th:if="${showActualHours}" th:text="#{main.general.showactualhours.text}">Actual</th>
          <th class="d-none d-lg-table-cell" th:if="${showActualHours}" th:text="#{main.general.difference.text}">Diff</th>
          <th class="d-none d-lg-table-cell" th:text="#{main.general.flags.text}">Flags</th>
          <th th:if="${#authorization.expression('hasRole(''MANAGER'')')}"></th>
          <th th:if="${#authorization.expression('hasRole(''MANAGER'')')}"></th>
          <th th:if="${#authorization.expression('hasRole(''MANAGER'')')}"></th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="so : ${suborders}" th:classappend="${!so.currentlyValid} ? 'table-danger' : ''">
          <td>
            <div th:text="${so.customerorder.sign}">Customer Order</div>
            <small class="text-muted" th:text="${so.customerorder.shortdescription}">Customer order short description</small>
          </td>
          <td th:text="${so.completeOrderSign}">Sign</td>
          <td class="d-none d-md-table-cell" th:text="${so.shortdescription}">Short description</td>
          <td class="d-none d-sm-table-cell">
            <div th:text="${so.fromDate}">From</div>
            <small class="text-muted">
              <span th:if="${so.untilDate == null}" th:text="#{main.general.open.text}">open</span>
              <span th:if="${so.untilDate != null}" th:text="${so.untilDate}">Until</span>
            </small>
          </td>
          <td class="d-none d-md-table-cell">
            <span th:if="${so.debithours != null and !so.debithours.zero}">
              <span th:text="${@durationUtils.format(so.debithours)}">0:00</span>
              <span th:if="${so.debithoursunit == 0}" th:text="' / ' + #{main.general.totaltime.text}"></span>
              <span th:if="${so.debithoursunit == 1}" th:text="' / ' + #{main.general.year.text}"></span>
              <span th:if="${so.debithoursunit == 12}" th:text="' / ' + #{main.general.month.text}"></span>
            </span>
          </td>
          <td class="d-none d-lg-table-cell" th:if="${showActualHours}">
            <span th:text="${@durationUtils.format(so.duration)}">0:00</span>
          </td>
          <td class="d-none d-lg-table-cell" th:if="${showActualHours}">
            <span th:if="${so.difference != null and so.difference.negative}" class="text-danger" th:text="${@durationUtils.format(so.difference)}">0:00</span>
            <span th:if="${so.difference != null and !so.difference.negative}" th:text="${@durationUtils.format(so.difference)}">0:00</span>
          </td>
          <td class="d-none d-lg-table-cell">
            <span th:if="${so.invoiceString == 'Y'}" class="badge bg-success-lt" th:title="#{main.suborder.invoice.text}"><i class="bi-cash-stack"></i></span>
            <span th:if="${so.standard}" class="badge bg-warning-lt" th:title="#{main.suborder.standard.text}"><i class="bi-bookmark-star-fill"></i></span>
            <span th:if="${so.commentnecessary}" class="badge bg-danger-lt" th:title="#{main.suborder.commentnecessary.text}"><i class="bi bi-chat-square-text"></i></span>
            <span th:if="${so.fixedPrice}" class="badge bg-primary-lt" th:title="#{main.suborder.fixedprice.text}"><i class="bi bi-tag-fill"></i></span>
            <span th:if="${so.trainingFlag}" class="badge bg-purple-lt" th:title="#{main.suborder.trainingflag.text}"><i class="bi bi-mortarboard"></i></span>
            <span th:if="${so.hide}" class="badge bg-secondary-lt"><i class="bi bi-eye-slash"></i></span>
          </td>
          <td th:if="${#authorization.expression('hasRole(''MANAGER'')')}">
            <a class="btn btn-outline-primary btn-sm" th:href="@{'/orders/suborders/' + ${so.id} + '/edit'}">
              <i class="icon ti ti-pencil m-0"></i>
            </a>
          </td>
          <td th:if="${#authorization.expression('hasRole(''MANAGER'')')}">
            <form th:action="@{'/orders/suborders/' + ${so.id} + '/copy'}" method="post">
              <button type="submit" class="btn btn-outline-secondary btn-sm" title="Copy">
                <i class="icon ti ti-copy m-0"></i>
              </button>
            </form>
          </td>
          <td th:if="${#authorization.expression('hasRole(''MANAGER'')')}">
            <form th:action="@{'/orders/suborders/' + ${so.id} + '/delete'}" method="post"
                  th:onsubmit="|return confirm('#{main.general.confirmdelete.text}');|">
              <button type="submit" class="btn btn-outline-danger btn-sm">
                <i class="icon ti ti-trash m-0"></i>
              </button>
            </form>
          </td>
        </tr>
        <tr th:if="${#lists.isEmpty(suborders)}">
          <td colspan="12" class="text-center text-muted py-4" th:text="#{main.general.norecords.text}">No records found</td>
        </tr>
      </tbody>
    </table>
  </div>

  <script th:inline="none">
    document.addEventListener('DOMContentLoaded', function () {
      const form = document.querySelector('form[data-filter-form]');
      if (!form) return;

      const STORAGE_KEY = form.dataset.filterForm + '-advanced-open';
      const toggleInput = document.getElementById('advanced-toggle');
      const panel = document.getElementById('advanced-filters');
      const collapseTrigger = document.getElementById('advanced-collapse-trigger');
      if (!toggleInput || !panel || !collapseTrigger) return;

      // Restore initial open state by adding 'show' directly (no animation, before Bootstrap lazy-inits)
      const serverOpen = panel.dataset.serverOpen === 'true';
      const localOpen = localStorage.getItem(STORAGE_KEY) === 'true';
      if (serverOpen || localOpen) {
        panel.classList.add('show');
        toggleInput.checked = true;
      }

      // Switch delegates to hidden Bootstrap data-API trigger — no window.bootstrap reference needed
      toggleInput.addEventListener('change', function () {
        collapseTrigger.click();
      });

      // Persist state via Bootstrap's own collapse events
      panel.addEventListener('show.bs.collapse', function () {
        toggleInput.checked = true;
        localStorage.setItem(STORAGE_KEY, 'true');
      });
      panel.addEventListener('hide.bs.collapse', function () {
        toggleInput.checked = false;
        localStorage.setItem(STORAGE_KEY, 'false');
      });

      // Auto-submit on select/named-checkbox changes; text input requires button/Enter
      form.querySelectorAll('select, input[type="checkbox"][name]').forEach(function (el) {
        el.addEventListener('change', function () { form.submit(); });
      });
    });
  </script>

</main>
</html>
