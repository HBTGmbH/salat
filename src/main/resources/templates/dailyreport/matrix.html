<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<section layout:fragment="content">

<style>
  .matrix-first-col {
    background: var(--tblr-card-bg, var(--tblr-body-bg));
    border-right: 2px solid;
    color:  var(--tblr-table-color) !important;
  }
  .matrix-last-col {
    border-left: 2px solid;
    color: var(--tblr-table-color) !important;
  }
  .matrix-day-col:not(:last-child) {
    border-right: 1px solid;
  }
  #matrix > thead {
    border-bottom: 2px solid;
  }
  #matrix > thead * th {
    color:  var(--tblr-table-color);
  }

  #matrix > tbody * td:not(:last-child):not(.matrix-first-col) {
    border-right: 1px solid;
  }

  #matrix > tfoot * td:not(:last-child):not(.matrix-first-col) {
    border-right: 1px solid;
  }

  #matrix > tfoot * td.bg-danger-lt {
    border: 2px solid !important;
  }

  #matrix > tfoot {
    border-top: 2px solid;
  }
  #matrix > tfoot > tr:first-child {
    border-bottom: 2px solid;
  }
  #matrix > tfoot > tr:first-child > td {
    font-weight: bold;
  }
  #matrix > tfoot > tr > td:first-child {
    text-align: right;
  }
  .matrix-day-col { min-width: 2.5rem; }
  #matrix > thead th.matrix-day-col {
    cursor: pointer;
  }
  #matrix .matrix-col-hover {
    background-color: rgba(var(--tblr-primary-rgb), 0.18) !important;
    color: var(--tblr-primary) !important;
  }
  #matrix thead .matrix-col-hover {
    background-color: rgba(var(--tblr-primary-rgb), 0.28) !important;
  }
  .matrix-today {
    border-left: 2px solid red !important;
    border-right: 2px solid red !important;
  }
  .matrix-row-even td:not([class*="bg-"]) {
    background-color: rgba(0, 0, 0, 0.025);
  }
  [data-bs-theme="dark"] .matrix-row-even td:not([class*="bg-"]) {
    background-color: rgba(255, 255, 255, 0.04);
  }
  .matrix-detail-popover.popover {
    border: none;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.22);
    max-width: 360px;
  }
  .matrix-detail-popover .popover-body {
    background: rgba(255, 255, 255, 0.82);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-radius: 6px;
    padding: 0.5rem 0.75rem;
    font-size: 0.8rem;
  }
  [data-bs-theme="dark"] .matrix-detail-popover.popover {
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 0 3px rgba(255, 255, 255, 0.18);
  }
  [data-bs-theme="dark"] .matrix-detail-popover .popover-body {
    background: rgba(28, 32, 44, 0.85);
  }
  .matrix-detail-popover .popover-arrow::after {
    border-top-color: rgba(255, 255, 255, 0.82);
  }
  [data-bs-theme="dark"] .matrix-detail-popover .popover-arrow::after {
    border-top-color: rgba(28, 32, 44, 0.85);
  }
</style>

<!-- Filter bar -->
<div class="card mb-3">
  <div class="card-body py-2">
    <div class="d-flex gap-2 align-items-center flex-wrap">

      <!-- Month navigation -->
      <div class="btn-group btn-group-sm">
        <a class="btn btn-outline-secondary"
           th:href="@{/dailyreport/matrix(month=${prevMonth},year=${prevYear})}">
          <i class="ti ti-chevron-left m-0"></i>
        </a>
        <input type="month" id="matrix-month-input"
               class="btn btn-outline-secondary"
               th:value="${yearMonth}"
               style="cursor:pointer">
        <a class="btn btn-outline-secondary"
           th:href="@{/dailyreport/matrix(month=${nextMonth},year=${nextYear})}">
          <i class="ti ti-chevron-right m-0"></i>
        </a>
      </div>
      <a class="btn btn-sm btn-outline-secondary" th:href="@{/dailyreport/matrix}">Heute</a>

      <!-- Fill not worked -->
      <form th:if="${selectedContractId > 0}" method="post" th:action="@{/dailyreport/matrix/fill-not-worked}">
        <input type="hidden" name="month" th:value="${yearMonth.monthValue}"/>
        <input type="hidden" name="year" th:value="${yearMonth.year}"/>
        <button type="submit" class="btn btn-sm btn-outline-secondary"
                th:disabled="${monthReleased}"
                th:title="${monthReleased} ? #{main.matrix.fillnotworked.disabled.title} : null"
                th:text="#{main.matrix.fillnotworked.button.text}">Rest nicht gearbeitet</button>
      </form>

      <!-- Employee selector (only when multiple contracts are viewable) -->
      <form class="ms-auto" method="get" th:action="@{/dailyreport/matrix}"
            th:if="${#lists.size(employeecontracts) > 1}">
        <input type="hidden" name="month" th:value="${yearMonth.monthValue}"/>
        <input type="hidden" name="year" th:value="${yearMonth.year}"/>
        <select name="employeeContractId" class="form-select form-select-sm tomselect"
                onchange="this.form.submit()" style="min-width: 200px">
          <option th:each="ec : ${employeecontracts}"
                  th:value="${ec.id}"
                  th:text="${ec.employee.name}"
                  th:selected="${ec.id == selectedContractId}">
          </option>
        </select>
      </form>

    </div>
  </div>
</div>

<!-- Matrix table -->
<div class="card">
  <div class="table-responsive">
    <table class="table table-vcenter table-sm card-table" id="matrix">

      <thead>
        <tr>
          <th class="matrix-first-col text-nowrap"
              th:text="#{main.matrixoverview.table.order}">Auftrag</th>
          <th th:each="dh : ${matrixData.dayHeaders}"
              class="text-center matrix-day-col px-1 text-nowrap"
              th:classappend="${dh.weekend ? 'bg-azure-lt ' : (dh.publicHoliday ? 'bg-warning-lt ' : '')} + ${dh.today ? 'matrix-today' : ''}"
              th:attr="data-daily-url=@{/dailyreport/daily(mode='daily',date=${dh.date})}">
            [[${dh.day}]]<br>
            <span style="font-size:0.7rem"
                  th:text="${#strings.substring(#messages.msg(dh.weekdayKey), 0, 2)}">Mo</span>
          </th>
          <th class="matrix-last-col text-center px-1 fw-bold text-nowrap"
              th:text="#{main.matrixoverview.table.sum.text}">Σ</th>
        </tr>
      </thead>

      <tbody>

        <!-- Empty state -->
        <tr th:if="${#lists.isEmpty(matrixData.rows)}">
          <td th:colspan="${#lists.size(matrixData.dayHeaders) + 2}" class="text-center py-3">
            Keine Buchungen in diesem Monat.
          </td>
        </tr>

        <tr th:each="row, rs : ${matrixData.rows}" th:classappend="${rs.even ? 'matrix-row-even' : ''}">
          <td class="matrix-first-col text-nowrap">
            <span class="small nowrap" style="display: block" th:text="|${row.customerOrderSign} · ${row.customerOrderDesc} · ${row.customer}|">1417 · Alpha · Kunde</span>
            <span style="display: block" th:text="|${row.suborderSign} · ${row.suborderDesc}|">01 · DEV-BACKEND</span>
          </td>
          <td th:each="cell, cs : ${row.cells}"
              class="text-center px-1"
              th:classappend="${matrixData.dayHeaders[cs.index].today ? 'matrix-today ' : ''} + ${cell.weekend ? 'bg-azure-lt' : (cell.publicHoliday ? 'bg-warning-lt' : '')}">
            <span th:if="${not cell.empty}" th:text="${cell.durationString}">7:30</span>
            <div th:if="${not cell.empty and not #lists.isEmpty(cell.details)}" class="matrix-cell-detail p-10 d-none">
              <div th:each="d : ${cell.details}" class="text-start text-nowrap">
                <strong th:text="${d.durationString}">1:00</strong>
                <span th:if="${d.taskDescription != null and not #strings.isEmpty(d.taskDescription)}"
                      th:text="${' – ' + d.taskDescription}"></span>
              </div>
            </div>
          </td>
          <td class="matrix-last-col text-center px-1 fw-medium" th:text="${row.totalString}">0:00</td>
        </tr>

      </tbody>

      <tfoot>
        <tr class="table-group-divider fw-medium">
          <td class="matrix-first-col text-nowrap"
              th:text="#{main.matrixoverview.table.overall.text}">GESAMT</td>
          <td th:each="fd, fs : ${matrixData.footerDays}"
              class="text-center px-1"
              th:classappend="${matrixData.dayHeaders[fs.index].today ? 'matrix-today ' : ''} + ${fd.totalError ? 'bg-danger-lt text-danger' : (fd.weekend ? 'bg-azure-lt' : (fd.publicHoliday ? 'bg-warning-lt' : ''))}">
            <span th:if="${not fd.empty}" th:text="${fd.workingTimeString}">7:30</span>
          </td>
          <td class="matrix-last-col text-center px-1 fw-bold" th:text="${matrixData.totalString}">0:00</td>
        </tr>

        <tr th:if="${showBeginBreakEnd}" class="small">
          <td class="matrix-first-col text-nowrap" th:text="#{main.matrixoverview.table.startofwork.text}">Beginn</td>
          <td th:each="fd, fs : ${matrixData.footerDays}"
              class="text-center px-1"
              th:classappend="${matrixData.dayHeaders[fs.index].today ? 'matrix-today ' : ''} + ${fd.beginError ? 'bg-danger-lt text-danger' : (fd.weekend ? 'bg-azure-lt' : (fd.publicHoliday ? 'bg-warning-lt' : ''))}">
            <span th:if="${fd.beginString != null}" th:text="${fd.beginString}">08:00</span>
          </td>
          <td class="matrix-last-col"></td>
        </tr>

        <tr th:if="${showBeginBreakEnd}" class="small">
          <td class="matrix-first-col text-nowrap" th:text="#{main.matrixoverview.table.breakduration.text}">Pause</td>
          <td th:each="fd, fs : ${matrixData.footerDays}"
              class="text-center px-1"
              th:classappend="${matrixData.dayHeaders[fs.index].today ? 'matrix-today ' : ''} + ${fd.breakError ? 'bg-danger-lt text-danger' : (fd.weekend ? 'bg-azure-lt' : (fd.publicHoliday ? 'bg-warning-lt' : ''))}">
            <span th:if="${fd.breakString != null}" th:text="${fd.breakString}">0:30</span>
          </td>
          <td class="matrix-last-col"></td>
        </tr>

        <tr th:if="${showBeginBreakEnd}" class="small">
          <td class="matrix-first-col text-nowrap" th:text="#{main.matrixoverview.table.endofwork.text}">Ende</td>
          <td th:each="fd, fs : ${matrixData.footerDays}"
              class="text-center px-1"
              th:classappend="${matrixData.dayHeaders[fs.index].today ? 'matrix-today ' : ''} + ${fd.weekend ? 'bg-azure-lt' : (fd.publicHoliday ? 'bg-warning-lt' : '')}">
            <span th:if="${fd.endString != null}" th:text="${fd.endString}">17:00</span>
          </td>
          <td class="matrix-last-col"></td>
        </tr>

        <tr th:if="${selectedContractId > 0}" class="small">
          <td class="matrix-first-col text-nowrap" th:text="#{main.matrixoverview.table.notworked.text}">Nicht gearbeitet</td>
          <td th:each="fd, fs : ${matrixData.footerDays}"
              class="text-center px-1"
              th:classappend="${matrixData.dayHeaders[fs.index].today ? 'matrix-today ' : ''} + ${fd.weekend ? 'bg-azure-lt' : (fd.publicHoliday ? 'bg-warning-lt' : '')}">
            <span th:if="${fd.notWorked}" class="text-warning">●</span>
          </td>
          <td class="matrix-last-col"></td>
        </tr>
      </tfoot>

    </table>
  </div>

  <div class="card-footer d-flex gap-3 flex-wrap align-items-center">
    <span th:if="${matrixData.totalString != null}">
      <span th:text="#{main.matrixoverview.headline.actualtime.text}">IST-Stunden:</span>
      <strong th:text="${matrixData.totalString}">0:00</strong>
    </span>
    <span th:if="${matrixData.targetString != null}">
      <span th:text="#{main.matrixoverview.headline.targettime.text}">SOLL-Stunden:</span>
      <strong th:text="${matrixData.targetString}">0:00</strong>
    </span>
    <span th:if="${matrixData.diffString != null}"
          th:classappend="${matrixData.diffNegative ? 'text-warning' : 'text-success'}">
      <span th:text="#{main.matrixoverview.headline.difference.text}">Differenz:</span>
      <strong th:text="${matrixData.diffString}">+0:00</strong>
    </span>
    <span th:if="${matrixData.prevDayDiffString != null}"
          th:classappend="${matrixData.prevDayDiffNegative ? 'text-warning' : 'text-success'}">
      <span th:text="#{main.matrixoverview.headline.prevdaydiff.text}">Stand gestern:</span>
      <strong th:text="${matrixData.prevDayDiffString}">+0:00</strong>
    </span>
    <span class="ms-auto small">
      <span class="badge bg-azure-lt me-1">Sa/So</span>
      <span class="badge bg-warning-lt me-1">Feiertag</span>
      <span class="badge me-1 matrix-today">Heute</span>
    </span>
  </div>
</div>


</section>

<script layout:fragment="scripts">
document.querySelectorAll('td .matrix-cell-detail').forEach(detail => {
  new tabler.bootstrap.Popover(detail.closest('td'), {
    html: true,
    content: detail.innerHTML,
    trigger: 'hover focus',
    placement: 'top',
    customClass: 'matrix-detail-popover'
  });
});

// Whole-column click and hover highlight → daily report for that day
(function () {
  const table = document.getElementById('matrix');
  const headers = Array.from(table.querySelectorAll('thead th'));

  function cellsInColumn(colIdx) {
    return table.querySelectorAll(`tr > *:nth-child(${colIdx + 1})`);
  }

  // Apply pointer cursor to every cell in a navigable day column
  headers.forEach((th, i) => {
    if (th.dataset.dailyUrl) cellsInColumn(i).forEach(c => c.style.cursor = 'pointer');
  });

  // Column hover highlight
  let activeColIdx = -1;
  table.addEventListener('mouseover', e => {
    const cell = e.target.closest('td, th');
    if (!cell) return;
    const colIdx = cell.cellIndex;
    if (colIdx === activeColIdx) return;
    cellsInColumn(activeColIdx).forEach(c => c.classList.remove('matrix-col-hover'));
    activeColIdx = colIdx;
    if (headers[colIdx]?.dataset.dailyUrl) {
      cellsInColumn(colIdx).forEach(c => c.classList.add('matrix-col-hover'));
    }
  });
  table.addEventListener('mouseleave', () => {
    cellsInColumn(activeColIdx).forEach(c => c.classList.remove('matrix-col-hover'));
    activeColIdx = -1;
  });

  // Click
  table.addEventListener('click', e => {
    const cell = e.target.closest('td, th');
    if (!cell) return;
    const url = headers[cell.cellIndex]?.dataset.dailyUrl;
    if (url) location.href = url;
  });
}());

document.getElementById('matrix-month-input')?.addEventListener('change', function () {
  const [yearRaw, monthRaw] = this.value.split('-');
  const year = Number.parseInt(yearRaw, 10);
  const month = Number.parseInt(monthRaw, 10);

  if (!Number.isInteger(year) || !Number.isInteger(month)) {
    return;
  }

  const url = new URL('/dailyreport/matrix', window.location.origin);
  url.searchParams.set('month', String(month));
  url.searchParams.set('year', String(year));
  location.href = url.toString();
});
</script>
</html>
