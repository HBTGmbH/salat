<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<section layout:fragment="content">

<style>
  .matrix-first-col {
    background: var(--tblr-card-bg, var(--tblr-body-bg));
    border-right: 2px solid;
  }
  .matrix-day-col { min-width: 2.5rem; }
  .matrix-today {
    border-left: 5px solid var(--tblr-primary);
    border-right: 5px solid var(--tblr-primary);
  }
  .matrix-row-even td:not([class*="bg-"]) {
    background-color: rgba(0, 0, 0, 0.025);
  }
  [data-bs-theme="dark"] .matrix-row-even td:not([class*="bg-"]) {
    background-color: rgba(255, 255, 255, 0.04);
  }
  .matrix-detail-popover.popover {
    border: none;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.22);
    max-width: 360px;
  }
  .matrix-detail-popover .popover-body {
    background: rgba(255, 255, 255, 0.82);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-radius: 6px;
    padding: 0.5rem 0.75rem;
    font-size: 0.8rem;
  }
  [data-bs-theme="dark"] .matrix-detail-popover .popover-body {
    background: rgba(28, 32, 44, 0.85);
  }
  .matrix-detail-popover .popover-arrow::after {
    border-top-color: rgba(255, 255, 255, 0.82);
  }
  [data-bs-theme="dark"] .matrix-detail-popover .popover-arrow::after {
    border-top-color: rgba(28, 32, 44, 0.85);
  }
</style>

<!-- Filter bar -->
<div class="card mb-3">
  <div class="card-body py-2">
    <div class="d-flex gap-2 align-items-center flex-wrap">

      <!-- Month navigation -->
      <div class="btn-group btn-group-sm">
        <a class="btn btn-outline-secondary"
           th:href="@{/dailyreport/matrix(month=${prevMonth},year=${prevYear},employeeContractId=${selectedContractId})}">
          <i class="ti ti-chevron-left m-0"></i>
        </a>
        <input type="month" id="matrix-month-input"
               class="btn btn-outline-secondary"
               th:value="${yearMonth}"
               th:attr="data-ec-id=${selectedContractId}"
               style="cursor:pointer">
        <a class="btn btn-outline-secondary"
           th:href="@{/dailyreport/matrix(month=${nextMonth},year=${nextYear},employeeContractId=${selectedContractId})}">
          <i class="ti ti-chevron-right m-0"></i>
        </a>
      </div>
      <a class="btn btn-sm btn-outline-secondary" th:href="@{/dailyreport/matrix(employeeContractId=${selectedContractId})}">Heute</a>
      <button id="matrix-details-toggle" type="button" class="btn btn-sm btn-outline-secondary"
              title="Buchungsdetails einblenden" th:text="Details">
      </button>

      <!-- Employee selector (only when multiple contracts are viewable) -->
      <form class="ms-auto" method="get" th:action="@{/dailyreport/matrix}"
            th:if="${#lists.size(employeecontracts) > 1}">
        <input type="hidden" name="month" th:value="${yearMonth.monthValue}"/>
        <input type="hidden" name="year" th:value="${yearMonth.year}"/>
        <select name="employeeContractId" class="form-select form-select-sm tomselect"
                onchange="this.form.submit()" style="min-width: 200px">
          <option th:each="ec : ${employeecontracts}"
                  th:value="${ec.id}"
                  th:text="${ec.employee.name}"
                  th:selected="${ec.id == selectedContractId}">
          </option>
        </select>
      </form>

    </div>
  </div>
</div>

<!-- Matrix table -->
<div class="card">
  <div class="table-responsive">
    <table class="table table-vcenter table-sm card-table" style="font-size: 0.82rem">

      <thead>
        <tr style="border-bottom: 2px solid">
          <th class="matrix-first-col text-nowrap"
              th:text="#{main.matrixoverview.table.order}">Auftrag</th>
          <th th:each="dh : ${matrixData.dayHeaders}"
              class="text-center matrix-day-col px-1 text-nowrap"
              th:classappend="${dh.today ? 'matrix-today ' : ''} + ${dh.weekend ? 'bg-azure-lt text-muted' : (dh.publicHoliday ? 'bg-warning-lt' : '')}">
            [[${dh.day}]]<br>
            <span style="font-size:0.7rem"
                  th:text="${#strings.substring(#messages.msg(dh.weekdayKey), 0, 2)}">Mo</span>
          </th>
          <th class="text-center px-1 fw-bold text-nowrap"
              style="border-left: 2px solid"
              th:text="#{main.matrixoverview.table.sum.text}">Σ</th>
        </tr>
      </thead>

      <tbody>

        <!-- Empty state -->
        <tr th:if="${#lists.isEmpty(matrixData.rows)}">
          <td th:colspan="${#lists.size(matrixData.dayHeaders) + 2}" class="text-center text-muted py-3">
            Keine Buchungen in diesem Monat.
          </td>
        </tr>

        <tr th:each="row, rs : ${matrixData.rows}" th:classappend="${rs.even ? 'matrix-row-even' : ''}">
          <td class="matrix-first-col text-nowrap">
            <span class="text-muted small nowrap" style="display: block" th:text="|${row.customerOrderSign} · ${row.customerOrderDesc} · ${row.customer}|">1417 · Alpha · Kunde</span>
            <span style="display: block" th:text="|${row.suborderSign} · ${row.suborderDesc}|">01 · DEV-BACKEND</span>
          </td>
          <td th:each="cell, cs : ${row.cells}"
              class="text-center px-1"
              th:classappend="${matrixData.dayHeaders[cs.index].today ? 'matrix-today ' : ''} + ${cell.weekend ? 'bg-azure-lt' : (cell.publicHoliday ? 'bg-warning-lt' : '')}">
            <span th:if="${not cell.empty}" th:text="${cell.durationString}">7:30</span>
            <span th:if="${cell.empty}" class="text-muted">—</span>
            <div th:if="${not cell.empty and not #lists.isEmpty(cell.details)}" class="matrix-cell-detail p-10 d-none">
              <div th:each="d : ${cell.details}" class="text-start text-nowrap">
                <strong th:text="${d.durationString}">1:00</strong>
                <span th:if="${d.taskDescription != null and not #strings.isEmpty(d.taskDescription)}"
                      th:text="${' – ' + d.taskDescription}"></span>
              </div>
            </div>
          </td>
          <td class="text-center px-1 fw-medium" th:text="${row.totalString}" style="border-left: 2px solid">0:00</td>
        </tr>

      </tbody>

      <tfoot>
        <tr class="table-group-divider fw-medium" style="border-top: 2px solid">
          <td class="matrix-first-col text-nowrap"
              th:text="#{main.matrixoverview.table.overall.text}">GESAMT</td>
          <td th:each="fd, fs : ${matrixData.footerDays}"
              class="text-center px-1"
              th:classappend="${matrixData.dayHeaders[fs.index].today ? 'matrix-today ' : ''} + ${fd.totalError ? 'bg-danger-lt text-danger' : (fd.weekend ? 'bg-azure-lt text-muted' : (fd.publicHoliday ? 'bg-warning-lt' : ''))}">
            <span th:if="${not fd.empty}" th:text="${fd.workingTimeString}">7:30</span>
            <span th:if="${fd.empty}" class="text-muted">—</span>
          </td>
          <td class="text-center px-1 fw-bold" th:text="${matrixData.totalString}" style="border-left: 2px solid">0:00</td>
        </tr>

        <tr th:if="${selectedContractId > 0}" class="text-muted small">
          <td class="matrix-first-col text-nowrap" th:text="#{main.matrixoverview.table.notworked.text}">Nicht gearbeitet</td>
          <td th:each="fd, fs : ${matrixData.footerDays}"
              class="text-center px-1"
              th:classappend="${matrixData.dayHeaders[fs.index].today ? 'matrix-today ' : ''} + ${fd.weekend ? 'bg-azure-lt' : (fd.publicHoliday ? 'bg-warning-lt' : '')}">
            <span th:if="${fd.notWorked}" class="text-warning">●</span>
          </td>
          <td style="border-left: 2px solid"></td>
        </tr>

        <tr th:if="${showBeginBreakEnd}" class="text-muted small">
          <td class="matrix-first-col text-nowrap" th:text="#{main.matrixoverview.table.startofwork.text}">Beginn</td>
          <td th:each="fd, fs : ${matrixData.footerDays}"
              class="text-center px-1"
              th:classappend="${matrixData.dayHeaders[fs.index].today ? 'matrix-today ' : ''} + ${fd.beginError ? 'bg-danger-lt text-danger' : (fd.weekend ? 'bg-azure-lt' : (fd.publicHoliday ? 'bg-warning-lt' : ''))}">
            <span th:if="${fd.beginString != null}" th:text="${fd.beginString}">08:00</span>
          </td>
          <td style="border-left: 2px solid"></td>
        </tr>

        <tr th:if="${showBeginBreakEnd}" class="text-muted small">
          <td class="matrix-first-col text-nowrap" th:text="#{main.matrixoverview.table.breakduration.text}">Pause</td>
          <td th:each="fd, fs : ${matrixData.footerDays}"
              class="text-center px-1"
              th:classappend="${matrixData.dayHeaders[fs.index].today ? 'matrix-today ' : ''} + ${fd.breakError ? 'bg-danger-lt text-danger' : (fd.weekend ? 'bg-azure-lt' : (fd.publicHoliday ? 'bg-warning-lt' : ''))}">
            <span th:if="${fd.breakString != null}" th:text="${fd.breakString}">0:30</span>
          </td>
          <td style="border-left: 2px solid"></td>
        </tr>

        <tr th:if="${showBeginBreakEnd}" class="text-muted small">
          <td class="matrix-first-col text-nowrap" th:text="#{main.matrixoverview.table.endofwork.text}">Ende</td>
          <td th:each="fd, fs : ${matrixData.footerDays}"
              class="text-center px-1"
              th:classappend="${matrixData.dayHeaders[fs.index].today ? 'matrix-today ' : ''} + ${fd.weekend ? 'bg-azure-lt' : (fd.publicHoliday ? 'bg-warning-lt' : '')}">
            <span th:if="${fd.endString != null}" th:text="${fd.endString}">17:00</span>
          </td>
          <td style="border-left: 2px solid"></td>
        </tr>
      </tfoot>

    </table>
  </div>

  <div class="card-footer d-flex gap-3 flex-wrap align-items-center">
    <span>
      <span th:text="#{main.matrixoverview.headline.actualtime.text}">IST-Stunden:</span>
      <strong th:text="${matrixData.totalString}">0:00</strong>
    </span>
    <span th:if="${matrixData.targetString != null}">
      <span th:text="#{main.matrixoverview.headline.targettime.text}">SOLL-Stunden:</span>
      <strong th:text="${matrixData.targetString}">0:00</strong>
    </span>
    <span th:if="${matrixData.diffString != null}"
          th:classappend="${matrixData.diffNegative ? 'text-warning' : 'text-success'}">
      <span th:text="#{main.matrixoverview.headline.difference.text}">Differenz:</span>
      <strong th:text="${matrixData.diffString}">+0:00</strong>
    </span>
    <span class="text-muted ms-auto small">
      <span class="badge bg-azure-lt text-muted me-1">Sa/So</span>
      <span class="badge bg-warning-lt me-1">Feiertag</span>
      <span class="badge me-1 matrix-today">Heute</span>
    </span>
  </div>
</div>


</section>

<script layout:fragment="scripts">
(function () {
  const btn = document.getElementById('matrix-details-toggle');
  if (!btn) return;
  let popovers = [];
  let active = false;

  btn.addEventListener('click', () => {
    active = !active;
    btn.classList.toggle('active', active);
    if (active) {
      document.querySelectorAll('td .matrix-cell-detail').forEach(detail => {
        const td = detail.closest('td');
        popovers.push(new tabler.bootstrap.Popover(td, {
          html: true,
          content: detail.innerHTML,
          trigger: 'hover focus',
          placement: 'top',
          customClass: 'matrix-detail-popover'
        }));
      });
    } else {
      popovers.forEach(p => p.dispose());
      popovers = [];
    }
  });
})();

document.getElementById('matrix-month-input')?.addEventListener('change', function () {
  const [year, month] = this.value.split('-');
  location.href = '/dailyreport/matrix?month=' + parseInt(month) + '&year=' + year + '&employeeContractId=' + this.dataset.ecId;
});
</script>
</html>
