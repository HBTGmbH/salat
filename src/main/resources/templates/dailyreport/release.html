<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}"
      th:with="title=${pageTitle},sectionTitle=${sectionTitle}">
<section layout:fragment="content">

  <div class="card">
    <div class="card-header">
      <h3 class="card-title" th:text="${loginEmployee.name}"></h3>
      <div class="card-options">
        <span class="text-muted small">
          <span th:text="#{main.release.released.until.text}">freigegeben bis</span>:
          <strong th:if="${not #strings.isEmpty(releasedUntil)}" th:text="${releasedUntil}"></strong>
          <strong th:if="${#strings.isEmpty(releasedUntil)}" th:text="#{main.release.released.never.text}">nie</strong>
          &nbsp;|&nbsp;
          <span th:text="#{main.release.accepted.until.text}">abgenommen bis</span>:
          <strong th:if="${not #strings.isEmpty(acceptedUntil)}" th:text="${acceptedUntil}"></strong>
          <strong th:if="${#strings.isEmpty(acceptedUntil)}" th:text="#{main.release.released.never.text}">nie</strong>
        </span>
      </div>
    </div>
    <div class="card-body">

      <form th:if="${loginEmployeeContract != null}" method="post" th:action="@{/release}">
        <label class="form-label fw-semibold" th:text="#{main.release.release.until.text}">Buchungen freigeben bis (incl.)</label>
        <div class="row g-2 align-items-center">
          <div class="col-auto">
            <input type="month" class="form-control" name="selfReleaseDate" th:value="${selfReleaseDateStr}" />
          </div>
          <div class="col-auto">
            <button type="submit" class="btn btn-primary"
                    th:onclick="|return confirm('#{main.general.confirmrelease.text}')|"
                    th:text="#{main.general.button.release.text}">Freigeben</button>
          </div>
        </div>
      </form>

      <div th:if="${loginEmployeeContract == null}" class="text-muted">
        <i class="bi bi-info-circle me-1"></i>
        <span th:text="#{main.release.no.active.contract.text}">Kein aktiver Mitarbeitervertrag gefunden.</span>
      </div>

    </div>
  </div>

</section>
</html>
