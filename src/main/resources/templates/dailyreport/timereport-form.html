<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}"
      th:with="containerClass='container-xl'">
<section layout:fragment="content">

  <!-- Validation errors -->
  <div th:if="${not #lists.isEmpty(errors)}" class="alert alert-danger mb-3">
    <ul class="mb-0">
      <li th:each="err : ${errors}" th:text="${err}"></li>
    </ul>
  </div>

  <div class="row align-items-start">

    <!-- ===== Main form column ===== -->
    <div class="col-lg-7">
      <div class="card">
        <div class="card-header">
          <h3 class="card-title"
              th:text="${isEdit} ? #{main.timereport.form.title.edit} : #{main.timereport.form.title.create}">
            Neue Buchung
          </h3>
        </div>

        <form id="timereportMainForm"
              th:action="${isEdit} ? @{/dailyreport/timereports/{id}(id=${timereportForm.id})} : @{/dailyreport/timereports}"
              method="post"
              th:object="${timereportForm}">

          <input type="hidden" th:if="${timereportForm.id != null}" th:field="*{id}"/>
          <input type="hidden" th:field="*{employeeContractId}"/>
          <input type="hidden" th:field="*{durationMode}" id="durationModeField"/>

          <div class="card-body">

            <!-- Row 1: Date + Duration/Begin-End -->
            <div class="row g-3 mb-3">

              <div class="col-auto">
                <label class="form-label required" th:text="#{main.timereport.form.date.label}">Datum</label>
                <input type="date" class="form-control" th:field="*{referenceday}"
                       hx-post="/dailyreport/timereports/refresh-orders"
                       hx-include="closest form"
                       hx-target="#orders-suborders-wrapper"
                       hx-swap="outerHTML"
                       hx-trigger="change"/>
              </div>

              <div class="col-auto">
                <label class="form-label required" th:text="#{main.timereport.form.duration.label}">Dauer</label>
                <div class="d-flex align-items-center gap-2">

                  <!-- Toggle buttons -->
                  <div class="btn-group flex-shrink-0" role="group">
                    <button type="button" class="btn btn-outline-secondary active" id="btnDuration"
                            onclick="showDuration()"
                            th:title="#{main.timereport.form.duration.mode.duration.tooltip}">
                      <i class="icon ti ti-hourglass m-0"></i>
                    </button>
                    <button type="button" class="btn btn-outline-secondary" id="btnBeginEnd"
                            onclick="showBeginEnd()"
                            th:title="#{main.timereport.form.duration.mode.beginend.tooltip}">
                      <i class="icon ti ti-clock-2 m-0"></i>
                    </button>
                  </div>

                  <!-- Duration entry -->
                  <div id="durationSection">
                    <div class="input-group">
                      <input type="number" class="form-control" th:field="*{durationHours}"
                             min="0" max="23" size="2"/>
                      <span class="input-group-text" th:text="#{main.timereport.form.hours.label}">h</span>
                      <select class="form-select" th:field="*{durationMinutes}">
                        <option value="0">00</option>
                        <option value="15">15</option>
                        <option value="30">30</option>
                        <option value="45">45</option>
                      </select>
                      <span class="input-group-text" th:text="#{main.timereport.form.minutes.label}">min</span>
                    </div>
                  </div>

                  <!-- Begin/End entry -->
                  <div id="beginEndSection" class="d-none">
                    <div class="d-flex gap-2 align-items-center">
                      <input type="time" class="form-control" th:field="*{beginTime}"
                             id="beginTimeInput" style="width:120px" oninput="updateDurationBadge()"/>
                      <span class="text-muted">–</span>
                      <input type="time" class="form-control" th:field="*{endTime}"
                             id="endTimeInput" style="width:120px" oninput="updateDurationBadge()"/>
                      <span class="badge bg-secondary-lt text-secondary ms-1" id="durationBadge"></span>
                    </div>
                  </div>

                </div>
              </div>
            </div>

            <!-- Orders + Suborders (combined HTMX swap target for date changes) -->
            <div id="orders-suborders-wrapper" th:fragment="ordersAndSubordersFragment">

              <!-- Order -->
              <div class="mb-3">
                <label class="form-label required" th:text="#{main.timereport.form.order.label}">Auftrag</label>
                <select class="form-select tomselect" name="orderId" id="orderId"
                        hx-post="/dailyreport/timereports/refresh-suborders"
                        hx-include="closest form"
                        hx-target="#suborder-select-wrapper"
                        hx-swap="outerHTML"
                        hx-trigger="change">
                  <option value="" th:text="#{main.timereport.form.order.placeholder}">— Auftrag wählen —</option>
                  <option th:each="o : ${orders}"
                          th:value="${o.id}"
                          th:text="${o.sign + ' · ' + o.shortdescription}"
                          th:selected="${timereportForm.orderId != null and timereportForm.orderId == o.id}"></option>
                </select>
              </div>

              <!-- Suborder (also standalone HTMX swap target for order changes) -->
              <div id="suborder-select-wrapper" th:fragment="suborderFragment" class="mb-3">
                <label class="form-label required" th:text="#{main.timereport.form.suborder.label}">Unterauftrag</label>
                <select class="form-select tomselect"
                        name="suborderId" id="suborderId"
                        hx-post="/dailyreport/timereports/refresh-sidebar"
                        hx-include="closest form"
                        hx-target="#form-sidebar"
                        hx-swap="outerHTML"
                        hx-trigger="change">
                  <option value="" th:text="#{main.timereport.form.suborder.placeholder}">— Unterauftrag wählen —</option>
                  <option th:each="s : ${suborders}"
                          th:value="${s.id}"
                          th:text="${s.label}"
                          th:attr="data-cnr=${s.commentNecessary}"
                          th:selected="${timereportForm.suborderId != null and timereportForm.suborderId == s.id}"></option>
                </select>
              </div>

            </div>

            <!-- Comment -->
            <div class="mb-3">
              <label id="commentLabel"
                     th:class="${'form-label' + (commentNecessary == true ? ' required' : '')}"
                     th:text="#{main.timereport.form.comment.label}">Kommentar</label>
              <textarea id="commentField" class="form-control" th:field="*{comment}" rows="3"
                        th:attr="required=${commentNecessary == true ? 'required' : null}"
                        th:placeholder="#{main.timereport.form.comment.placeholder}"></textarea>
            </div>

            <!-- Training -->
            <div class="mb-3">
              <label class="form-check form-switch">
                <input class="form-check-input" type="checkbox" th:field="*{training}"/>
                <span class="form-check-label" th:text="#{main.timereport.form.training.label}">Fortbildung</span>
              </label>
            </div>

            <!-- Serial booking (create only) -->
            <div class="mb-3" th:unless="${isEdit}">
              <button type="button" class="btn btn-outline-secondary" onclick="toggleSerial(event)">
                <i class="ti ti-repeat me-1"></i>
                <span th:text="#{main.timereport.form.serial.button}">Für mehrere Arbeitstage wiederholen…</span>
              </button>
              <div class="mt-3 d-none" id="serialSection">
                <label class="form-label" th:text="#{main.timereport.form.serial.label}">Wiederholen für</label>
                <div class="d-flex gap-2 align-items-center">
                  <select class="form-select" th:field="*{numberOfSerialDays}" style="width:210px">
                    <option value="1" th:text="#{main.timereport.form.serial.none}">Nicht wiederholen</option>
                    <option value="2">2 <span th:text="#{main.timereport.form.serial.days.label}">Arbeitstage</span></option>
                    <option value="3">3 <span th:text="#{main.timereport.form.serial.days.label}">Arbeitstage</span></option>
                    <option value="5">5 <span th:text="#{main.timereport.form.serial.days.label}">Arbeitstage</span></option>
                    <option value="10">10 <span th:text="#{main.timereport.form.serial.days.label}">Arbeitstage</span></option>
                  </select>
                  <span class="text-muted small" th:text="#{main.timereport.form.serial.hint}"></span>
                </div>
              </div>
            </div>

          </div><!-- end card-body -->

          <!-- Footer: Save + Cancel -->
          <div class="card-footer d-flex gap-2">
            <button type="submit" class="btn btn-primary">
              <i class="ti ti-device-floppy me-1"></i>
              <span th:text="#{main.timereport.form.save}">Speichern</span>
            </button>
            <button type="button" class="btn btn-outline-secondary" onclick="toggleSaveAsFav()">
              <i class="ti ti-star me-1"></i>
              <span th:text="#{main.timereport.form.savefav.button}">Als Favorit speichern</span>
            </button>
            <a th:href="@{/dailyreport/daily(mode='daily',date=${timereportForm.referenceday},employeeContractId=${timereportForm.employeeContractId})}"
               class="btn btn-secondary ms-auto"
               th:text="#{main.timereport.form.cancel}">Abbrechen</a>
          </div>

          <!-- Save as favourite panel (hidden by default) -->
          <div class="card-footer d-none" id="saveAsFavSection">
            <div class="d-flex gap-2 align-items-center">
              <span class="form-label mb-0 me-1 text-nowrap" th:text="#{main.timereport.form.savefav.label}">Favorit speichern?</span>
              <label class="form-check form-switch mb-0">
                <input class="form-check-input" type="checkbox" th:field="*{saveAsFavorite}"/>
              </label>
              <button type="submit" class="btn btn-primary text-nowrap ms-2">
                <i class="ti ti-device-floppy me-1"></i>
                <span th:text="#{main.timereport.form.savefav.action}">Speichern &amp; Favorit</span>
              </button>
            </div>
          </div>

        </form>
      </div>
    </div><!-- end main col -->

    <!-- ===== Sidebar column ===== -->
    <div class="col-lg-5">
      <div id="form-sidebar" th:fragment="sidebarFragment"
           th:attr="hx-swap-oob=${oobSidebar == true ? 'outerHTML' : null}">

        <!-- Employee selector (People Lead / Manager only) -->
        <form th:if="${employeecontracts != null}" method="get"
              th:action="@{/dailyreport/timereports/new}"
              class="card mb-3">
          <div class="card-header">
            <h3 class="card-title">
              <span th:text="#{main.timereport.sidebar.employee.title}">Mitarbeiter</span>
              <span class="badge bg-yellow-lt text-yellow ms-1 fw-normal" style="font-size:0.65rem"
                    th:text="#{main.timereport.sidebar.employee.badge}">Manager</span>
            </h3>
          </div>
          <div class="card-body">
            <input type="hidden" name="date" th:value="${timereportForm.referenceday}"/>
            <select class="form-select tomselect" name="employeeContractId" onchange="this.form.submit()">
              <option th:each="ec : ${employeecontracts}"
                      th:value="${ec.id}"
                      th:text="${ec.employee.name}"
                      th:selected="${ec.id == timereportForm.employeeContractId}"></option>
            </select>
            <div class="form-text" th:text="#{main.timereport.sidebar.employee.hint}"></div>
          </div>
        </form>

        <!-- Today's bookings -->
        <div class="card mb-3">
          <div class="card-header">
            <h3 class="card-title" th:text="#{main.timereport.sidebar.bookings.title}">Buchungen</h3>
            <div class="card-options">
              <span class="text-muted small"
                    th:text="${#temporals.format(timereportForm.referenceday, 'EEE d MMM', #locale)}"></span>
            </div>
          </div>
          <div th:if="${#lists.isEmpty(todaysBookings)}"
               class="card-body text-muted small"
               th:text="#{main.timereport.sidebar.bookings.nomatch}">
            Noch keine Buchungen.
          </div>
          <div class="list-group list-group-flush" th:unless="${#lists.isEmpty(todaysBookings)}">
            <div class="list-group-item" th:each="tr : ${todaysBookings}">
              <div class="d-flex justify-content-between align-items-start">
                <div>
                  <div class="fw-medium small" th:text="${tr.completeOrderSign}"></div>
                  <div class="text-muted" style="font-size:0.75rem"
                       th:if="${tr.taskdescription != null and !tr.taskdescription.isEmpty()}"
                       th:text="${tr.taskdescription}"></div>
                </div>
                <span class="badge bg-blue-lt ms-2"
                      th:text="${@durationUtils.format(tr.duration)}"></span>
              </div>
            </div>
          </div>
        </div>

        <!-- Recent comments -->
        <div class="card" th:if="${timereportForm.suborderId != null and not #lists.isEmpty(recentComments)}">
          <div class="card-header">
            <h3 class="card-title" th:text="#{main.timereport.sidebar.recentcomments.title}">Letzte Kommentare</h3>
          </div>
          <div class="list-group list-group-flush">
            <button type="button"
                    class="list-group-item list-group-item-action text-start py-2 px-3"
                    style="white-space: pre-wrap"
                    th:each="c : ${recentComments}"
                    th:attr="data-comment=${c}"
                    onclick="fillComment(this.dataset.comment)"
                    th:text="${c}"></button>
          </div>
          <div class="card-footer text-muted small" th:text="#{main.timereport.sidebar.recentcomments.hint}"></div>
        </div>

      </div><!-- end #form-sidebar -->
    </div><!-- end sidebar col -->

  </div><!-- end row -->

  <script th:inline="none">
    function showDuration() {
      document.getElementById('durationSection').classList.remove('d-none');
      document.getElementById('beginEndSection').classList.add('d-none');
      document.getElementById('btnDuration').classList.add('active');
      document.getElementById('btnBeginEnd').classList.remove('active');
      document.getElementById('durationModeField').value = 'duration';
    }
    function showBeginEnd() {
      document.getElementById('durationSection').classList.add('d-none');
      document.getElementById('beginEndSection').classList.remove('d-none');
      document.getElementById('btnDuration').classList.remove('active');
      document.getElementById('btnBeginEnd').classList.add('active');
      document.getElementById('durationModeField').value = 'beginEnd';
    }
    function toggleSaveAsFav() {
      document.getElementById('saveAsFavSection').classList.toggle('d-none');
    }
    function toggleSerial(e) {
      e.preventDefault();
      document.getElementById('serialSection').classList.toggle('d-none');
    }
    function fillComment(text) {
      var ta = document.querySelector('textarea[name="comment"]');
      if (ta) ta.value = text;
    }
    function updateCommentRequired() {
      var sel = document.getElementById('suborderId');
      var label = document.getElementById('commentLabel');
      var ta = document.getElementById('commentField');
      if (!sel || !label || !ta) return;
      var opt = sel.options[sel.selectedIndex];
      var required = opt && opt.dataset.cnr === 'true';
      if (required) {
        label.classList.add('required');
        ta.setAttribute('required', 'required');
      } else {
        label.classList.remove('required');
        ta.removeAttribute('required');
      }
    }
    document.addEventListener('DOMContentLoaded', function() {
      var sel = document.getElementById('suborderId');
      if (sel) sel.addEventListener('change', updateCommentRequired);
      updateCommentRequired();
    });
    document.addEventListener('htmx:afterSettle', function() {
      var sel = document.getElementById('suborderId');
      if (sel) sel.addEventListener('change', updateCommentRequired);
      updateCommentRequired();
    });
    function updateDurationBadge() {
      var b = document.getElementById('beginTimeInput').value;
      var e = document.getElementById('endTimeInput').value;
      var badge = document.getElementById('durationBadge');
      if (b && e) {
        var bp = b.split(':').map(Number), ep = e.split(':').map(Number);
        var mins = (ep[0] * 60 + ep[1]) - (bp[0] * 60 + bp[1]);
        if (mins > 0) {
          badge.textContent = Math.floor(mins / 60) + 'h' + String(mins % 60).padStart(2, '0');
        } else {
          badge.textContent = '';
        }
      }
    }
    // restore durationMode toggle state on page load (e.g. after validation re-render)
    (function () {
      var mode = document.getElementById('durationModeField').value;
      if (mode === 'beginEnd') showBeginEnd();
    })();
  </script>

</section>

<!--
  Composite fragment returned by refresh-orders: invisible to the page renderer
  (outside layout:fragment="content") but reachable by HTMX fragment requests.
  Primary swap = ordersAndSubordersFragment; OOB swap = sidebarFragment.
-->
<th:block th:fragment="ordersRefreshCompositeFragment">
  <th:block th:replace="~{:: ordersAndSubordersFragment}"/>
  <th:block th:replace="~{:: sidebarFragment}"/>
</th:block>

<!-- Composite fragment returned by refresh-suborders. -->
<th:block th:fragment="suborderRefreshCompositeFragment">
  <th:block th:replace="~{:: suborderFragment}"/>
  <th:block th:replace="~{:: sidebarFragment}"/>
</th:block>

</html>
