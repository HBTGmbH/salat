<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<section layout:fragment="content">

<!-- ═══════════════════════════════════════════════════════════ -->
<!-- Shared header: mode tabs + employee selector               -->
<!-- ═══════════════════════════════════════════════════════════ -->
<div class="d-flex align-items-center gap-3 mb-3 flex-wrap">

  <!-- Mode tabs -->
  <ul class="nav nav-pills">
    <li class="nav-item">
      <a class="nav-link"
         th:classappend="${mode == 'daily'} ? 'active' : ''"
         th:href="@{/dailyreport/daily(mode='daily',date=${date},employeeContractId=${selectedContractId})}">
        <span th:text="#{main.daily.mode.daily.text}">Tagesansicht</span>
      </a>
    </li>
    <li class="nav-item">
      <a class="nav-link"
         th:classappend="${mode == 'list'} ? 'active' : ''"
         th:href="@{/dailyreport/daily(mode='list',month=${yearMonth.monthValue},year=${yearMonth.year},employeeContractId=${selectedContractId})}">
        <span th:text="#{main.daily.mode.list.text}">Monatsübersicht</span>
      </a>
    </li>
  </ul>

  <!-- Employee selector (only when multiple contracts are viewable) -->
  <form class="ms-auto" method="get" th:action="@{/dailyreport/daily}"
        th:if="${#lists.size(employeecontracts) > 1}">
    <input type="hidden" name="mode" th:value="${mode}"/>
    <input type="hidden" th:if="${mode == 'daily'}" name="date" th:value="${date}"/>
    <input type="hidden" th:if="${mode == 'list' and yearMonth != null}" name="month" th:value="${yearMonth.monthValue}"/>
    <input type="hidden" th:if="${mode == 'list' and yearMonth != null}" name="year" th:value="${yearMonth.year}"/>
    <select name="employeeContractId" class="form-select form-select-sm tomselect"
            onchange="this.form.submit()" style="min-width: 200px">
      <option th:each="ec : ${employeecontracts}"
              th:value="${ec.id}"
              th:text="${ec.employee.name}"
              th:selected="${ec.id == selectedContractId}">
      </option>
    </select>
  </form>
</div>

<!-- ═══════════════════════════════════════════════════════════ -->
<!-- DAILY MODE                                                  -->
<!-- ═══════════════════════════════════════════════════════════ -->
<div th:if="${mode == 'daily'}">
  <div class="row align-items-start">
    <div class="col-lg-8">

      <!-- Date navigation -->
      <div class="card mb-3">
        <div class="card-body text-center py-3">
          <div class="d-flex justify-content-between align-items-center mb-2">
            <a class="btn btn-outline-secondary"
               th:href="@{/dailyreport/daily(mode='daily',date=${prevDate},employeeContractId=${selectedContractId})}">
              <i class="ti ti-chevron-left me-1"></i><span th:text="#{main.daily.nav.prevday.text}">Vorheriger Tag</span>
            </a>
            <h3 class="mb-0" th:text="${#temporals.format(date, 'EEEE, d. MMMM yyyy')}"></h3>
            <a class="btn btn-outline-secondary"
               th:href="@{/dailyreport/daily(mode='daily',date=${nextDate},employeeContractId=${selectedContractId})}">
              <span th:text="#{main.daily.nav.nextday.text}">Nächster Tag</span><i class="ti ti-chevron-right ms-1"></i>
            </a>
          </div>
          <a class="btn btn-sm btn-outline-primary"
             th:href="@{/dailyreport/daily(mode='daily',employeeContractId=${selectedContractId})}">
            <span th:text="#{main.daily.nav.today.text}">Heute</span>
          </a>
        </div>
      </div>

      <!-- Workingday card -->
      <div class="card mb-3" th:if="${selectedContractId > 0}">
        <div class="card-body">
          <form method="post" th:action="@{/dailyreport/daily/workingday}" id="workingday-form">
            <input type="hidden" name="employeeContractId" th:value="${selectedContractId}"/>
            <input type="hidden" name="date" th:value="${date}"/>

            <!-- Not-worked toggle -->
            <div class="mb-3">
              <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" id="notWorkedToggle" name="notWorked"
                       th:checked="${dailyData != null and dailyData.workingday != null and dailyData.workingday.type.name() == 'NOT_WORKED'}"
                       onchange="toggleWorkingFields(this.checked)">
                <label class="form-check-label" for="notWorkedToggle"
                       th:text="#{main.daily.workingday.notworked.label}">Nicht gearbeitet</label>
              </div>
            </div>

            <!-- Start / Break / Save row -->
            <div id="working-fields" class="row g-3 align-items-end">
              <div class="col">
                <label class="form-label" th:text="#{main.daily.workingday.start.label}">Start</label>
                <input type="time" class="form-control" id="starttime"
                       th:name="'starttimehour'" style="display:none"
                       th:value="${dailyData != null and dailyData.workingday != null} ? ${#numbers.formatInteger(dailyData.workingday.starttimehour, 2) + ':' + #numbers.formatInteger(dailyData.workingday.starttimeminute, 2)} : '08:00'">
                <!-- Hidden fields for hour/minute split — populated by JS -->
                <input type="hidden" name="starttimehour" id="starttimehour-val"
                       th:value="${dailyData != null and dailyData.workingday != null} ? ${dailyData.workingday.starttimehour} : 8">
                <input type="hidden" name="starttimeminute" id="starttimeminute-val"
                       th:value="${dailyData != null and dailyData.workingday != null} ? ${dailyData.workingday.starttimeminute} : 0">
                <input type="time" class="form-control" id="starttime-display"
                       th:value="${dailyData != null and dailyData.workingday != null} ? ${#numbers.formatInteger(dailyData.workingday.starttimehour, 2) + ':' + #numbers.formatInteger(dailyData.workingday.starttimeminute, 2)} : '08:00'"
                       onchange="splitTime('starttime-display','starttimehour-val','starttimeminute-val')">
              </div>
              <div class="col">
                <label class="form-label" th:text="#{main.daily.workingday.break.label}">Pause</label>
                <input type="hidden" name="breakhours" id="breakhours-val"
                       th:value="${dailyData != null and dailyData.workingday != null} ? ${dailyData.workingday.breakhours} : 0">
                <input type="hidden" name="breakminutes" id="breakminutes-val"
                       th:value="${dailyData != null and dailyData.workingday != null} ? ${dailyData.workingday.breakminutes} : 0">
                <input type="time" class="form-control" id="break-display"
                       th:value="${dailyData != null and dailyData.workingday != null} ? ${#numbers.formatInteger(dailyData.workingday.breakhours, 2) + ':' + #numbers.formatInteger(dailyData.workingday.breakminutes, 2)} : '00:30'"
                       onchange="splitTime('break-display','breakhours-val','breakminutes-val')">
              </div>
              <div class="col-auto">
                <button type="submit" class="btn btn-primary">
                  <i class="ti ti-device-floppy me-1"></i><span th:text="#{main.daily.workingday.save.button}">Speichern</span>
                </button>
              </div>
            </div>
          </form>

          <!-- Progress / quitting time -->
          <div th:if="${dailyData != null and dailyData.hasTarget}" class="mt-3">
            <div class="d-flex justify-content-between align-items-center mb-1">
              <span class="text-muted small">
                <span th:text="#{main.daily.booked.label}">Gebucht:</span>
                <strong th:text="${@durationUtils.format(dailyData.totalBooked)}"></strong>
                <span th:text="#{main.daily.of.label}">von</span>
                <strong th:text="${dailyData.workingday != null ? @durationUtils.format(dailyData.workingday.employeecontract.dailyWorkingTime) : '—'}"></strong>
              </span>
              <span class="text-muted small" th:if="${dailyData.workingday != null}">
                <span th:text="#{main.daily.quitting.label}">Feierabend ~</span>
                <strong th:text="${dailyData.quittingTime}"></strong>
              </span>
            </div>
            <div class="progress" style="height: 8px" th:if="${dailyData.progressPercent > 0 or dailyData.hasTarget}">
              <div class="progress-bar"
                   th:classappend="${dailyData.overMaxHours} ? 'bg-danger' : 'bg-primary'"
                   role="progressbar"
                   th:style="'width:' + ${dailyData.progressPercent} + '%'">
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Add booking -->
      <div class="d-flex gap-2 mb-3" th:if="${selectedContractId > 0}">
        <a th:href="@{/do/CreateDailyReport}" class="btn btn-success flex-fill">
          <i class="ti ti-plus me-1"></i><span th:text="#{main.general.mainmenu.newreport.text}">Neue Buchung</span>
        </a>
      </div>

      <!-- Bookings table -->
      <div class="card" th:if="${dailyData != null and not #lists.isEmpty(dailyData.timereports)}">
        <div class="table-responsive">
          <table class="table table-vcenter card-table">
            <thead>
              <tr>
                <th th:text="#{main.daily.column.order}">Auftrag / Unterauftrag</th>
                <th class="w-1 text-nowrap" th:text="#{main.daily.column.duration}">Zeit</th>
                <th class="w-1"></th>
                <th class="w-1"></th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="tr : ${dailyData.timereports}">
                <td>
                  <div class="fw-medium" th:text="${tr.completeOrderSign}"></div>
                  <div class="text-muted small" th:text="${tr.customerShortname}"></div>
                  <div class="text-muted small mt-1" th:if="${not #strings.isEmpty(tr.taskdescription)}" th:text="${tr.taskdescription}"></div>
                </td>
                <td class="text-nowrap">
                  <span class="badge bg-blue-lt" th:text="${@durationUtils.format(tr.duration)}"></span>
                </td>
                <td>
                  <a th:href="@{/do/EditDailyReport(trId=${tr.id})}" class="btn btn-sm btn-outline-primary">
                    <i class="icon ti ti-pencil m-0"></i>
                  </a>
                </td>
                <td>
                  <button type="button" class="btn btn-sm btn-outline-danger"
                          th:attr="data-tr-id=${tr.id},data-tr-desc=${tr.completeOrderSign}"
                          onclick="openDeleteModal(this)"
                          data-bs-toggle="modal" data-bs-target="#deleteModal">
                    <i class="icon ti ti-trash m-0"></i>
                  </button>
                </td>
              </tr>
            </tbody>
            <tfoot th:if="${dailyData != null}">
              <tr class="table-group-divider">
                <td class="text-muted" th:text="#{main.daily.column.total}">Gesamt</td>
                <td><span class="badge bg-blue-lt" th:text="${@durationUtils.format(dailyData.totalBooked)}"></span></td>
                <td colspan="2"></td>
              </tr>
            </tfoot>
          </table>
        </div>
      </div>

    </div><!-- end main col -->

    <!-- Sidebar -->
    <div class="col-lg-4" th:if="${dailyData != null}">

      <!-- Week strip -->
      <div class="card mb-3">
        <div class="card-header">
          <h3 class="card-title" th:text="#{main.daily.week.title}">Diese Woche</h3>
        </div>
        <div class="list-group list-group-flush">
          <a th:each="wd : ${dailyData.weekStrip}"
             th:href="@{/dailyreport/daily(mode='daily',date=${wd.date},employeeContractId=${selectedContractId})}"
             class="list-group-item list-group-item-action d-flex justify-content-between align-items-center"
             th:classappend="${wd.isSelected} ? 'active' : ''">
            <div>
              <div class="d-inline-block text-center rounded px-2 py-1"
                   th:classappend="${wd.isSelected} ? '' : (${wd.isHoliday} ? 'bg-red-lt' : (${wd.isToday} ? 'bg-blue-lt' : 'bg-secondary-lt'))"
                   style="width:3rem">
                <div class="fw-bold lh-1"
                     th:classappend="${wd.isSelected} ? 'text-white' : (${wd.isHoliday} ? 'text-red' : (${wd.isToday} ? 'text-blue' : 'text-muted'))"
                     style="font-size:1.1rem"
                     th:text="${wd.date.dayOfMonth}"></div>
                <div class="opacity-75"
                     th:classappend="${wd.isSelected} ? 'text-white' : (${wd.isHoliday} ? 'text-red' : (${wd.isToday} ? 'text-blue' : 'text-muted'))"
                     style="font-size:0.65rem"
                     th:text="${#temporals.format(wd.date, 'EEE')}"></div>
              </div>
              <div th:if="${wd.isHoliday and wd.holidayName != null}" class="text-red mt-1"
                   style="font-size:0.7rem;white-space:nowrap" th:text="${wd.holidayName}"></div>
            </div>
            <span th:if="${wd.notWorked}" class="badge bg-secondary-lt text-muted" th:text="#{main.daily.notworked.badge}">—</span>
            <span th:if="${!wd.notWorked and wd.booked.isZero()}" class="badge bg-secondary-lt text-muted">—</span>
            <span th:if="${!wd.notWorked and !wd.booked.isZero()}"
                  class="badge"
                  th:classappend="${wd.isSelected} ? 'bg-white text-primary' : 'bg-blue-lt text-blue'"
                  th:text="${@durationUtils.format(wd.booked)}"></span>
          </a>
        </div>
      </div>

    </div><!-- end sidebar -->
  </div>
</div><!-- end daily mode -->

<!-- ═══════════════════════════════════════════════════════════ -->
<!-- LIST MODE                                                   -->
<!-- ═══════════════════════════════════════════════════════════ -->
<div th:if="${mode == 'list'}">

  <!-- Month navigation + fill-not-worked -->
  <div class="d-flex align-items-center gap-2 mb-3 flex-wrap">
    <div class="btn-group">
      <a class="btn btn-outline-secondary"
         th:href="@{/dailyreport/daily(mode='list',month=${prevMonth},year=${prevYear},employeeContractId=${selectedContractId})}">
        <i class="ti ti-chevron-left m-0"></i>
      </a>
      <span class="btn btn-outline-secondary disabled"
            th:text="${yearMonth != null ? yearMonth.month.getDisplayName(T(java.time.format.TextStyle).FULL, #locale) + ' ' + yearMonth.year : ''}"></span>
      <a class="btn btn-outline-secondary"
         th:href="@{/dailyreport/daily(mode='list',month=${nextMonth},year=${nextYear},employeeContractId=${selectedContractId})}">
        <i class="ti ti-chevron-right m-0"></i>
      </a>
    </div>
    <a class="btn btn-sm btn-outline-secondary"
       th:href="@{/dailyreport/daily(mode='list',employeeContractId=${selectedContractId})}">
      <span th:text="#{main.daily.nav.today.text}">Heute</span>
    </a>

    <!-- Fill not worked -->
    <form th:if="${selectedContractId > 0 and listData != null}" method="post"
          th:action="@{/dailyreport/daily/fill-not-worked}" class="ms-auto">
      <input type="hidden" name="employeeContractId" th:value="${selectedContractId}"/>
      <input type="hidden" name="month" th:value="${yearMonth.monthValue}"/>
      <input type="hidden" name="year" th:value="${yearMonth.year}"/>
      <button type="submit" class="btn btn-sm btn-outline-secondary"
              th:disabled="${listData.monthReleased}"
              th:title="${listData.monthReleased} ? #{main.matrix.fillnotworked.disabled.title} : null"
              th:text="#{main.matrix.fillnotworked.button.text}">Rest nicht gearbeitet</button>
    </form>
  </div>

  <!-- Day list -->
  <div class="card" th:if="${listData != null}">
    <div class="table-responsive">
      <table class="table table-vcenter card-table">
        <thead>
          <tr>
            <th style="width:3rem"></th>
            <th th:text="#{main.daily.column.order}">Auftrag / Unterauftrag</th>
            <th class="w-1 text-nowrap" th:text="#{main.daily.column.duration}">Zeit</th>
            <th class="w-1"></th>
            <th class="w-1"></th>
          </tr>
        </thead>
        <tbody>
          <th:block th:each="day : ${listData.days}">
            <!-- Day header row -->
            <tr th:classappend="${day.isToday} ? 'table-active' : (${day.isWeekend or day.isHoliday} ? 'table-secondary' : '')">
              <td class="text-center fw-bold" style="vertical-align:top">
                <a th:href="@{/dailyreport/daily(mode='daily',date=${day.date},employeeContractId=${selectedContractId})}"
                   class="btn btn-sm btn-ghost-secondary p-1"
                   th:title="#{main.daily.viewday.title}">
                  <div th:text="${day.date.dayOfMonth}"></div>
                  <div class="text-muted" style="font-size:0.65rem" th:text="${#temporals.format(day.date, 'EEE')}"></div>
                </a>
              </td>
              <td colspan="4">
                <span th:if="${day.notWorked}" class="badge bg-secondary-lt text-muted"
                      th:text="#{main.daily.workingday.notworked.label}">Nicht gearbeitet</span>
                <span th:if="${day.isHoliday}" class="badge bg-red-lt text-red ms-1"
                      th:text="${day.holidayName}"></span>
                <span th:if="${#lists.isEmpty(day.timereports) and !day.notWorked and !day.isWeekend and !day.isHoliday}"
                      class="text-muted small">—</span>
              </td>
            </tr>
            <!-- Timereport rows for this day -->
            <tr th:each="tr : ${day.timereports}"
                th:classappend="${day.isWeekend or day.isHoliday} ? 'table-secondary' : ''">
              <td></td>
              <td>
                <div class="fw-medium small" th:text="${tr.completeOrderSign}"></div>
                <div class="text-muted" style="font-size:0.75rem" th:text="${tr.customerShortname}"></div>
                <div class="text-muted" style="font-size:0.75rem" th:if="${not #strings.isEmpty(tr.taskdescription)}"
                     th:text="${tr.taskdescription}"></div>
              </td>
              <td class="text-nowrap">
                <span class="badge bg-blue-lt" th:text="${@durationUtils.format(tr.duration)}"></span>
              </td>
              <td>
                <a th:href="@{/do/EditDailyReport(trId=${tr.id})}" class="btn btn-sm btn-outline-primary">
                  <i class="icon ti ti-pencil m-0"></i>
                </a>
              </td>
              <td>
                <button type="button" class="btn btn-sm btn-outline-danger"
                        th:attr="data-tr-id=${tr.id},data-tr-desc=${tr.completeOrderSign},data-mode='list',data-date=${day.date},data-month=${yearMonth.monthValue},data-year=${yearMonth.year}"
                        onclick="openDeleteModal(this)"
                        data-bs-toggle="modal" data-bs-target="#deleteModal">
                  <i class="icon ti ti-trash m-0"></i>
                </button>
              </td>
            </tr>
          </th:block>
        </tbody>
        <!-- Month totals -->
        <tfoot th:if="${listData.hasTarget}" class="table-group-divider">
          <tr>
            <td colspan="2" class="text-end text-muted small" th:text="#{main.matrixoverview.headline.actualtime.text}">IST</td>
            <td><span class="badge bg-blue-lt" th:text="${listData.monthTotal}"></span></td>
            <td colspan="2"></td>
          </tr>
          <tr>
            <td colspan="2" class="text-end text-muted small" th:text="#{main.matrixoverview.headline.targettime.text}">SOLL</td>
            <td><span class="badge bg-secondary-lt text-muted" th:text="${listData.monthTarget}"></span></td>
            <td colspan="2"></td>
          </tr>
          <tr>
            <td colspan="2" class="text-end text-muted small" th:text="#{main.matrixoverview.headline.difference.text}">Differenz</td>
            <td>
              <span class="badge"
                    th:classappend="${listData.monthDiffNegative} ? 'bg-danger-lt text-danger' : 'bg-success-lt text-success'"
                    th:text="${listData.monthDiff}"></span>
            </td>
            <td colspan="2"></td>
          </tr>
        </tfoot>
      </table>
    </div>
  </div>

</div><!-- end list mode -->

<!-- ═══════════════════════════════════════════════════════════ -->
<!-- Delete confirmation modal                                   -->
<!-- ═══════════════════════════════════════════════════════════ -->
<div class="modal modal-blur fade" id="deleteModal" tabindex="-1" role="dialog" aria-hidden="true">
  <div class="modal-dialog modal-sm modal-dialog-centered" role="document">
    <div class="modal-content">
      <div class="modal-body">
        <div class="modal-title" th:text="#{main.daily.delete.modal.title}">Buchung löschen?</div>
        <div id="deleteModalDesc" class="text-muted mt-1"></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary me-auto" data-bs-dismiss="modal"
                th:text="#{main.general.button.cancel.text}">Abbrechen</button>
        <form id="deleteForm" method="post" th:action="@{/dailyreport/daily/delete-timereport}">
          <input type="hidden" id="deleteTimereportId" name="timereportId"/>
          <input type="hidden" id="deleteDate" name="date"/>
          <input type="hidden" id="deleteMode" name="mode"/>
          <input type="hidden" name="employeeContractId" th:value="${selectedContractId}"/>
          <input type="hidden" id="deleteMonth" name="month"/>
          <input type="hidden" id="deleteYear" name="year"/>
          <button type="submit" class="btn btn-danger" th:text="#{main.daily.delete.modal.confirm}">Löschen</button>
        </form>
      </div>
    </div>
  </div>
</div>

<script th:inline="javascript">
  function openDeleteModal(btn) {
    document.getElementById('deleteTimereportId').value = btn.dataset.trId;
    document.getElementById('deleteModalDesc').textContent = btn.dataset.trDesc || '';
    document.getElementById('deleteDate').value = btn.dataset.date || '';
    document.getElementById('deleteMode').value = btn.dataset.mode || 'daily';
    document.getElementById('deleteMonth').value = btn.dataset.month || '';
    document.getElementById('deleteYear').value = btn.dataset.year || '';
  }

  function toggleWorkingFields(notWorked) {
    document.getElementById('working-fields').style.display = notWorked ? 'none' : '';
  }

  function splitTime(srcId, hourId, minId) {
    var val = document.getElementById(srcId).value;
    if (val) {
      var parts = val.split(':');
      document.getElementById(hourId).value = parseInt(parts[0], 10);
      document.getElementById(minId).value = parseInt(parts[1], 10);
    }
  }

  // Init: hide working fields if not-worked is checked
  (function() {
    var toggle = document.getElementById('notWorkedToggle');
    if (toggle && toggle.checked) {
      toggleWorkingFields(true);
    }
  })();
</script>

</section>
</html>
