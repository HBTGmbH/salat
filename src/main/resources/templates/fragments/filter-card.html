<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
  <!--
    Advanced filter card fragment.

    Parameters:
      formKey        - value for data-filter-form (used as localStorage key prefix)
      formAction     - th:action URL for the form
      primaryFilters - fragment slot: main filter row content (~{::primaryFilters})
      advancedFilters - fragment slot: collapse panel content (~{::advancedFilters})
                        pass _ when the page has no advanced filters

    Usage:
      <div th:replace="~{fragments/filter-card :: filterCard(
          formKey='co',
          formAction=@{/orders/customerorders},
          primaryFilters=~{::primaryFilters},
          advancedFilters=~{::advancedFilters}
      )}">
        <th:block th:fragment="primaryFilters">
          ... selects and inputs for the main filter row ...
        </th:block>
        <th:block th:fragment="advancedFilters">
          ... checkboxes and text inputs for the collapse panel ...
        </th:block>
      </div>
  -->
  <div th:fragment="filterCard(formKey, formAction, primaryFilters, advancedFilters)" class="card mb-3">
    <div class="card-body">
      <form method="get" th:action="${formAction}" th:attr="data-filter-form=${formKey}">

        <div class="row g-2 align-items-end">
          <th:block th:replace="${primaryFilters}"/>
        </div>

        <div class="mt-2">
          <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" id="advanced-toggle" role="switch">
            <label class="form-check-label text-muted small" th:text="#{main.general.filter.advanced.text}">Advanced Filter</label>
          </div>
        </div>

        <button type="button" class="d-none" id="advanced-collapse-trigger"
                data-bs-toggle="collapse" data-bs-target="#advanced-filters"></button>

        <div class="collapse mt-3" id="advanced-filters">
          <th:block th:replace="${advancedFilters}"/>
        </div>

      </form>
    </div>
  </div>

  <script th:fragment="filterCardJs" th:inline="none">
    document.addEventListener('DOMContentLoaded', function () {
      const form = document.querySelector('form[data-filter-form]');
      if (!form) return;

      const STORAGE_KEY = form.dataset.filterForm + '-advanced-open';
      const toggleInput = document.getElementById('advanced-toggle');
      const panel = document.getElementById('advanced-filters');
      const collapseTrigger = document.getElementById('advanced-collapse-trigger');
      if (!toggleInput || !panel || !collapseTrigger) return;

      const serverOpen = panel.dataset.serverOpen === 'true';
      const localOpen = localStorage.getItem(STORAGE_KEY) === 'true';
      if (serverOpen || localOpen) {
        panel.classList.add('show');
        toggleInput.checked = true;
      }

      toggleInput.addEventListener('change', function () {
        collapseTrigger.click();
      });

      panel.addEventListener('show.bs.collapse', function () {
        toggleInput.checked = true;
        localStorage.setItem(STORAGE_KEY, 'true');
      });
      panel.addEventListener('hide.bs.collapse', function () {
        toggleInput.checked = false;
        localStorage.setItem(STORAGE_KEY, 'false');
      });

      form.querySelectorAll('select, input[type="checkbox"][name]').forEach(function (el) {
        el.addEventListener('change', function () { form.requestSubmit(); });
      });
    });
  </script>

</body>
</html>
