<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
  <!--
    Danger zone card fragment — the trigger card shown on an edit form.
    Pair with dangerZoneModal below.

    Parameters:
      params  - DangerZoneParams: cardTitle, description, buttonLabel, modalId

    Usage:
      <div th:replace="~{fragments/danger-zone :: dangerZone(
          params=${#dzone.card(
              __#{form.employee.anonymize.dangerzone.title}__,
              __#{form.employee.anonymize.dangerzone.description}__,
              __#{form.employee.anonymize.button}__,
              'anonymizeModal'
          )}
      )}"></div>
  -->
  <div th:fragment="dangerZone(params)" class="card mt-3 border-danger">
    <div class="card-header">
      <h4 class="card-title text-danger" th:text="${params.cardTitle}">Danger Zone</h4>
    </div>
    <div class="card-body">
      <p class="text-muted" th:text="${params.description}"></p>
      <button type="button" class="btn btn-danger"
              th:attr="data-bs-target='#' + ${params.modalId}"
              data-bs-toggle="modal"
              th:text="${params.buttonLabel}">Action</button>
    </div>
  </div>

  <!--
    Danger zone modal fragment — the confirmation modal.
    The inner form gets id="${params.modalId}Form" for script access.

    Parameters:
      params      - DangerZoneModalParams: modalId, modalTitle, warningMessage, submitLabel
      formAction  - POST URL for the confirmation form (@{/path})
      modalBody   - fragment slot: confirmation inputs (~{::modalBodyContent})

    Usage:
      <div th:replace="~{fragments/danger-zone :: dangerZoneModal(
          params=${#dzone.modal(
              'anonymizeModal',
              __#{form.employee.anonymize.modal.title}__,
              __#{form.employee.anonymize.modal.warning}__,
              __#{form.employee.anonymize.modal.submit}__
          )},
          formAction=@{/employees/{id}/anonymize(id=${employeeForm.id})},
          modalBody=~{::modalBodyContent}
      )}">
        <th:block th:fragment="modalBodyContent">
          ... confirmation inputs ...
        </th:block>
      </div>
  -->
  <div th:fragment="dangerZoneModal(params, formAction, modalBody)"
       class="modal modal-blur fade" th:id="${params.modalId}" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog modal-sm modal-dialog-centered" role="document">
      <div class="modal-content">
        <form th:action="${formAction}" method="post" th:id="${params.modalId} + 'Form'">
          <div class="modal-header">
            <h5 class="modal-title" th:text="${params.modalTitle}">Confirm</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <div class="alert alert-danger" role="alert">
              <div class="d-flex">
                <div><i class="bi bi-exclamation-triangle-fill me-2"></i></div>
                <div th:text="${params.warningMessage}"></div>
              </div>
            </div>
            <th:block th:replace="${modalBody}"/>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-link link-secondary me-auto"
                    data-bs-dismiss="modal" th:text="#{main.general.button.cancel.text}">Cancel</button>
            <button type="submit" class="btn btn-danger" th:text="${params.submitLabel}">Confirm</button>
          </div>
        </form>
      </div>
    </div>
  </div>

</body>
</html>
