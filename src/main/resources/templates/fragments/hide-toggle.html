<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!--/* Customer hide-toggle flags cell */-->
<td class="d-none d-lg-table-cell" th:fragment="customerHideFlag">
  <th:block th:if="${#authorization.expression('hasRole(''MANAGER'')')}">
    <form th:action="@{/customers/{id}/toggle-hide(id=${cu.id})}" method="post">
      <button type="submit"
              th:hx-post="@{/customers/{id}/toggle-hide(id=${cu.id})}"
              hx-include="closest form"
              hx-target="closest td"
              hx-swap="outerHTML"
              class="border-0 bg-transparent p-0"
              style="cursor:pointer"
              th:title="#{main.general.hide.toggle}">
        <span th:class="${cu.hide} ? 'badge bg-danger-lt' : 'badge bg-secondary-lt'">
          <i class="bi bi-eye-slash" th:if="${cu.hide}"></i>
          <i class="bi bi-eye" th:unless="${cu.hide}" style="opacity:0.35"></i>
        </span>
      </button>
    </form>
  </th:block>
  <th:block th:unless="${#authorization.expression('hasRole(''MANAGER'')')}">
    <span th:if="${cu.hide}" class="badge bg-danger-lt" th:title="#{main.general.hide}">
      <i class="bi bi-eye-slash"></i>
    </span>
  </th:block>
</td>

<!--/* Suborder hide-toggle flags cell (includes all suborder flag badges) */-->
<td class="d-none d-lg-table-cell" th:fragment="suborderHideFlag">
  <span th:if="${so.invoiceString == 'Y'}" class="badge bg-success-lt" th:title="#{main.suborder.invoice.text}"><i class="bi-cash-stack"></i></span>
  <span th:if="${so.standard}" class="badge bg-warning-lt" th:title="#{main.suborder.standard.text}"><i class="bi-bookmark-star-fill"></i></span>
  <span th:if="${so.commentnecessary}" class="badge bg-danger-lt" th:title="#{main.suborder.commentnecessary.text}"><i class="bi bi-chat-square-text"></i></span>
  <span th:if="${so.fixedPrice}" class="badge bg-primary-lt" th:title="#{main.suborder.fixedprice.text}"><i class="bi bi-tag-fill"></i></span>
  <span th:if="${so.trainingFlag}" class="badge bg-purple-lt" th:title="#{main.suborder.trainingflag.text}"><i class="bi bi-mortarboard"></i></span>
  <th:block th:if="${#authorization.expression('hasRole(''MANAGER'')')}">
    <form th:action="@{/orders/suborders/{id}/toggle-hide(id=${so.id})}" method="post">
      <button type="submit"
              th:hx-post="@{/orders/suborders/{id}/toggle-hide(id=${so.id})}"
              hx-include="closest form"
              hx-target="closest td"
              hx-swap="outerHTML"
              class="border-0 bg-transparent p-0"
              style="cursor:pointer"
              th:title="#{main.general.hide.toggle}">
        <span th:class="${so.hide} ? 'badge bg-danger-lt' : 'badge bg-secondary-lt'">
          <i class="bi bi-eye-slash" th:if="${so.hide}"></i>
          <i class="bi bi-eye" th:unless="${so.hide}" style="opacity:0.35"></i>
        </span>
      </button>
    </form>
  </th:block>
  <th:block th:unless="${#authorization.expression('hasRole(''MANAGER'')')}">
    <span th:if="${so.hide}" class="badge bg-danger-lt" th:title="#{main.general.hide}">
      <i class="bi bi-eye-slash"></i>
    </span>
  </th:block>
</td>
