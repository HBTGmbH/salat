<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
  <!-- Generic form field fragments usable across modules -->
  <div class="d-none">

    <th:block th:fragment="form(_action, _inputs, _buttons)">
      <form th:action="${_action}" method="post" class="card">
        <div class="card-body" th:insert="${_inputs}">
        </div>

        <div class="card-footer" th:insert="${_buttons}">
        </div>
      </form>
    </th:block>

    <div th:fragment="saveCancelButtons(_cancelHref)" class="d-flex gap-2" th:with="
      _saveLabel = (${_saveLabel} ?: #{'main.button.label.save.text'}),
      _cancelLabel = (${_cancelLabel} ?: #{'main.button.label.cancel.text'}),
      _saveIcon = (${_saveIcon} ?: #{'ti-device-floppy'})
    ">
      <button type="submit" class="btn btn-primary">
        <i th:class="|icon ti ${_saveIcon}|"></i>
        <span th:text="${_saveLabel}">Save</span>
      </button>
      <a th:href="${_cancelHref}" class="btn btn-secondary" th:text="${_cancelLabel}">Cancel</a>
    </div>

    <th:block th:fragment="text(_field, _label)" th:with="
      _required = (${_required} ?: false),
      _maxLength = (${_maxLength} ?: 200),
      _helpText = (${_helpText} ?: null),
      _rows = (${_rows} ?: 1),
      _monospace = (${_monospace} ?: false)
    ">
      <div class="mb-3">
        <label class="form-label" th:classappend="${_required ? 'required' : ''}"
               th:for="${_field}" th:text="${_label}">Label</label>
        <input th:if="${_rows == 1}" type="text" class="form-control" th:id="${_field}" th:field="*{__${_field}__}"
               th:errorclass="is-invalid" th:maxlength="${_maxlength}" th:required="${_required}" />
        <textarea th:if="${_rows > 1}" class="form-control" th:id="${_field}" th:field="*{__${_field}__}"
                  th:errorclass="is-invalid" th:rows="${_rows}" th:required="${_required}"
                  th:style="${_monospace ? 'font-family: monospace' : _}"></textarea>
        <div class="form-text" th:if="${_helpText}" th:text="${_helpText}"></div>
        <div class="invalid-feedback" th:if="${#fields.hasErrors(_field)}" th:errors="*{__${_field}__}"></div>
      </div>
    </th:block>

    <!--
      Text input field.
      params  - TextInputParams: field, required (default false), maxlength, helpText (null = no help)
      label   - display label (use #{...} for i18n keys)

      Usage: th:replace="~{fragments/form-fields :: textInput(
        params=${#ffield.required('name', 255)}, label=#{main.customer.name.text}
      )}"
    -->
    <div th:fragment="textInput(params, label)" class="mb-3">
      <label class="form-label" th:classappend="${params.required ? 'required' : ''}"
             th:for="${params.field}" th:text="${label}">Label</label>
      <input type="text" class="form-control" th:id="${params.field}" th:field="*{__${params.field}__}"
             th:errorclass="is-invalid" th:maxlength="${params.maxlength}" th:required="${params.required}" />
      <div class="form-text" th:if="${params.helpText}" th:text="${params.helpText}"></div>
      <div class="invalid-feedback" th:if="${#fields.hasErrors('__${params.field}__')}" th:errors="*{__${params.field}__}"></div>
    </div>

    <!--
      Textarea field.
      params  - TextareaParams: field, required (default false), rows (default 3), monospace (default false), helpText
      label   - display label (use #{...} for i18n keys)

      Usage: th:replace="~{fragments/form-fields :: textareaInput(
        params=${#ffield.requiredCode('sql', 15)}, label='SQL'
      )}"
    -->
    <div th:fragment="textareaInput(params, label)" class="mb-3">
      <label class="form-label" th:classappend="${params.required ? 'required' : ''}"
             th:for="${params.field}" th:text="${label}">Label</label>
      <textarea class="form-control" th:id="${params.field}" th:field="*{__${params.field}__}"
                th:errorclass="is-invalid" th:rows="${params.rows}" th:required="${params.required}"
                th:style="${params.monospace ? 'font-family: monospace;' : ''}"></textarea>
      <div class="form-text" th:if="${params.helpText}" th:text="${params.helpText}"></div>
      <div class="invalid-feedback" th:if="${#fields.hasErrors('__${params.field}__')}" th:errors="*{__${params.field}__}"></div>
    </div>

    <!--
      Select dropdown field.
      params       - SelectInputParams: field, required (default false), options, optionValue, optionLabel, helpText
      label        - display label (use #{...} for i18n keys)
      placeholder  - placeholder option text (#{...} or null for no placeholder)

      Usage: th:replace="~{fragments/form-fields :: selectInput(
        params=${#ffield.requiredSelect('supervisorId', supervisors, 'id', 'name')},
        label=#{main.employeecontract.supervisor.text},
        placeholder=#{main.general.selectone.text}
      )}"
    -->
    <div th:fragment="selectInput(params, label, placeholder)" class="mb-3">
      <label class="form-label" th:classappend="${params.required ? 'required' : ''}"
             th:for="${params.field}" th:text="${label}">Label</label>
      <select class="form-select tomselect" th:id="${params.field}" th:field="*{__${params.field}__}"
              th:errorclass="is-invalid" th:required="${params.required}">
        <option value="" th:if="${placeholder}" th:text="${placeholder}">-- Select --</option>
        <option th:each="option : ${params.options}"
                th:value="${params.optionValue != null ? option[params.optionValue] : option}"
                th:text="${params.optionLabel != null ? option[params.optionLabel] : option}"></option>
      </select>
      <div class="form-text" th:if="${params.helpText}" th:text="${params.helpText}"></div>
      <div class="invalid-feedback" th:if="${#fields.hasErrors('__${params.field}__')}" th:errors="*{__${params.field}__}"></div>
    </div>

    <!--
      Date input field (native browser date picker).
      Usage: th:replace="~{fragments/form-fields :: dateInput(
        field='validFrom', label=#{main.customerorder.validfrom.text}, required=true
      )}"
    -->
    <div th:fragment="dateInput(field, label, required)" class="mb-3">
      <label class="form-label" th:classappend="${required ? 'required' : ''}" th:for="${field}" th:text="${label}">Label</label>
      <input type="date" class="form-control" th:id="${field}" th:field="*{__${field}__}"
             th:errorclass="is-invalid" th:required="${required}" />
      <div class="invalid-feedback" th:if="${#fields.hasErrors('__${field}__')}" th:errors="*{__${field}__}"></div>
    </div>

    <!--
      Checkbox switch field.
      Usage: th:replace="~{fragments/form-fields :: checkboxSwitch(
        field='enabled', label='Enabled'
      )}"
    -->
    <div th:fragment="checkboxSwitch(field, label)" class="mb-3">
      <label class="form-check form-switch">
        <input class="form-check-input" type="checkbox" th:field="*{__${field}__}" />
        <span class="form-check-label" th:text="${label}">Label</span>
      </label>
      <div class="invalid-feedback" th:if="${#fields.hasErrors('__${field}__')}" th:errors="*{__${field}__}"></div>
    </div>

    <!--
      Form action buttons (Save and Cancel).
      Usage: th:replace="~{fragments/form-fields :: formButtons(
        saveLabel='Save Job', cancelHref=@{/reporting/jobs}
      )}"
    -->
    <div th:fragment="formButtons(saveLabel, cancelHref)" class="d-flex gap-2">
      <button type="submit" class="btn btn-primary">
        <i class="icon ti ti-device-floppy"></i>
        <span th:text="${saveLabel ?: 'Save'}">Save</span>
      </button>
      <a th:href="${cancelHref}" class="btn btn-secondary">Cancel</a>
    </div>

  </div>
</body>
</html>
