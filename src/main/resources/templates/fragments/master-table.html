<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
  <!-- Generic master table fragments usable across modules -->
  <div class="d-none">
    <!--
      Usage example:
      <div th:replace="~{fragments/master-table :: masterTable(
          params=${@masterTableParams.withAdd('Add New', 'ti-plus')},
          addHref=@{/Add}, addIf=${true},
          thead=~{::theadContent}, tbody=~{::tbodyContent}
      )}">
        <thead th:fragment="theadContent">...</thead>
        <tbody th:fragment="tbodyContent">...</tbody>
      </div>
    -->
    <section th:fragment="masterTable(params, addHref, addIf, thead, tbody)">
      <div class="card mb-3" th:if="${addHref != '' && addIf}">
        <div class="card-body">
          <div class="row g-2">
            <div class="col-md-6"></div>
            <div class="col-auto"></div>
            <div class="col-auto ms-auto">
              <a class="btn btn-success" th:href="${addHref}">
                <i class="icon ti" th:classappend="${params.addIcon}"></i>
                [[${params.addLabel}]]
              </a>
            </div>
          </div>
        </div>
      </div>
      <div class="table-responsive card">
        <table class="table table-vcenter card-table">
          <thead th:replace="${thead}"></thead>
          <tbody th:replace="${tbody}"></tbody>
        </table>
      </div>
    </section>

    <section th:fragment="masterTableFilter(params, addHref, addIf, filterHref, filterValue, thead, tbody)">
      <div class="card mb-3">
        <div class="card-body">
          <form class="row g-2" method="get" th:action="${filterHref}">
            <div class="col-md-6">
              <input type="text" class="form-control" name="filter" placeholder="Filter"
                     th:value="${filterValue}" />
            </div>
            <div class="col-auto">
              <button class="btn btn-primary" type="submit"><i class="icon ti ti-filter m-0"></i></button>
            </div>
            <div class="col-auto ms-auto" th:if="${addHref != '' && addIf}">
              <a class="btn btn-success" th:href="${addHref}">
                <i class="icon ti" th:classappend="${params.addIcon}"></i>
                [[${params.addLabel}]]
              </a>
            </div>
          </form>
        </div>
      </div>
      <div class="table-responsive card">
        <table class="table table-vcenter card-table">
          <thead th:replace="${thead}"></thead>
          <tbody th:replace="${tbody}"></tbody>
        </table>
      </div>
    </section>

    <th th:fragment="colHeaderPrimary(label)"><span th:text="${label}">Header</span></th>
    <th th:fragment="colHeader(label)" class="d-none d-sm-table-cell"><span th:text="${label}">Header</span></th>
    <th th:fragment="colHeaderActionIcon()" class="w-1"></th>

    <!--
      colText: responsive=null/'' always visible; 'sm'/'md'/'lg' hidden below that breakpoint.
      Replaces deprecated colTextPrimary (use responsive=null) and colText (use responsive='sm').
    -->
    <td th:fragment="colText(text, responsive)"
        th:class="${#strings.isEmpty(responsive) ? '' : 'd-none d-' + responsive + '-table-cell'}"
        th:text="${text}">Text</td>

    <!--
      colTextAdd: two-line text cell with secondary line in muted small text.
      responsive: same convention as colText.
    -->
    <td th:fragment="colTextAdd(text, additional, responsive)"
        th:class="${#strings.isEmpty(responsive) ? '' : 'd-none d-' + responsive + '-table-cell'}">
      <div th:text="${text}">text</div>
      <small class="text-muted" th:text="${additional}">description</small>
    </td>

    <td th:fragment="colYesNo(enabled)" class="d-none d-sm-table-cell">
      <span th:if="${enabled}" class="text-success"><i class="icon ti ti-circle-check"></i> Yes</span>
      <span th:if="${!enabled}" class="text-danger"><i class="icon ti ti-circle-x"></i> No</span>
    </td>

    <td th:fragment="colCron(cronExpr, defCron, desc)" class="d-none d-sm-table-cell">
      <div th:text="${#strings.isEmpty(cronExpr) ? defCron : cronExpr}">cron</div>
      <small class="text-muted" th:text="${desc}">description</small>
    </td>

    <td th:fragment="colDate(date)" th:text="${#temporals.format(date, 'yyyy-MM-dd HH:mm')}" class="d-none d-sm-table-cell">2025-01-01 00:00</td>

    <!--
      colDateRange: from-date with open/until secondary line.
      responsive: same convention as colText.
    -->
    <td th:fragment="colDateRange(fromDate, untilDate, responsive)"
        th:class="${#strings.isEmpty(responsive) ? '' : 'd-none d-' + responsive + '-table-cell'}">
      <div th:text="${fromDate}" class="text-nowrap">From</div>
      <small class="text-muted">
        <span th:if="${untilDate == null}" th:text="#{main.general.open.text}">open</span>
        <span th:if="${untilDate != null}" th:text="${untilDate}">Until</span>
      </small>
    </td>

    <!--
      colEditLink: pass ifCondition=true for always-visible (replaces deprecated colEditLink(href)).
      Pass an expression for conditional visibility (replaces deprecated colEditLinkIf).
    -->
    <td th:fragment="colEditLink(href, ifCondition)">
      <a th:if="${ifCondition}" class="btn btn-outline-primary" th:href="${href}"><i class="icon ti ti-pencil m-0"></i></a>
    </td>

    <!--
      colDeleteForm: pass ifCondition=true for always-visible (replaces deprecated colDeleteForm(id,action)).
      Pass an expression for conditional visibility (replaces deprecated colDeleteFormIf).
    -->
    <td th:fragment="colDeleteForm(id, action, ifCondition)">
      <form th:if="${ifCondition}" th:action="${action}" method="post" th:onsubmit="|return confirm('Are you sure?');|">
        <input type="hidden" name="id" th:value="${id}"/>
        <input type="hidden" name="filter" th:if="${filter}" th:value="${filter}" />
        <button type="submit" class="btn btn-outline-danger"><i class="icon ti ti-trash m-0"></i></button>
      </form>
    </td>

    <!--
      colSlot: wraps arbitrary fragment-slot markup in a <td>.
      responsive: same convention as colText. Pass _ for empty slot.
      Usage:
        <td th:replace="~{fragments/master-table :: colSlot(content=~{::cellContent}, responsive='lg')}">
          <th:block th:fragment="cellContent">
            ... custom markup ...
          </th:block>
        </td>
    -->
    <td th:fragment="colSlot(content, responsive)"
        th:class="${#strings.isEmpty(responsive) ? '' : 'd-none d-' + responsive + '-table-cell'}">
      <th:block th:replace="${content}"/>
    </td>

  </div>
</body>
</html>
