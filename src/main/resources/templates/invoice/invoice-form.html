<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}"
      th:with="section='backoffice',subSection='invoice',title=${pageTitle},sectionTitle=#{main.general.mainmenu.backoffice.text}">
<main layout:fragment="content">

  <style>
    .col-hidden { display: none !important; }
    .row-excluded { opacity: 0.35; }
    .invoice-row { cursor: pointer; }
    .table .invoice-last-row > * { border-bottom-width: 0; }
  </style>

  <form id="invoice-form" th:action="@{/invoice/generate}" th:object="${invoiceForm}" method="post">

    <!-- ═══════════════════════════════════════════════════════════════
         PHASE 1 — Data selection  (3-column grid throughout)
         ═══════════════════════════════════════════════════════════════ -->
    <div class="card mb-3">
      <div class="card-header">
        <h3 class="card-title mb-0" th:text="#{main.invoice.dataset.text}">Datensatz</h3>
      </div>
      <div class="card-body">
        <div class="row g-3 align-items-start">

          <!-- Col 1: Order -->
          <div class="col-12 col-md-4">
            <label class="form-label fw-semibold" th:text="#{main.monthlyreport.customerorder.text}">Auftrag</label>
            <select class="form-select tomselect" id="orderId" th:field="*{orderId}" onchange="submitUpdate()">
              <option value="" th:text="#{main.invoice.choose.text}">-- Bitte wählen --</option>
              <option th:each="order : ${orders}"
                      th:value="${order.id}"
                      th:text="${order.signAndDescription}"></option>
            </select>
          </div>

          <!-- Col 2: Suborder -->
          <div class="col-12 col-md-4">
            <label class="form-label fw-semibold" th:text="#{main.monthlyreport.suborder.text}">Unterauftrag</label>
            <select class="form-select tomselect" id="suborderId" th:field="*{suborderId}">
              <option value="" th:text="#{main.general.allsuborders.text}">-- Alle --</option>
              <option th:each="so : ${suborders}"
                      th:value="${so.id}"
                      th:text="${so.completeOrderSignAndDescription}"></option>
            </select>
            <div class="form-check mt-1">
              <input class="form-check-input" type="checkbox" id="showOnlyValid"
                     th:field="*{showOnlyValid}" onchange="submitUpdate()">
              <label class="form-check-label small text-muted" for="showOnlyValid"
                     th:text="#{main.general.show.only.valid.text}">Nur gültige</label>
            </div>
          </div>

          <!-- Col 3: Period -->
          <div class="col-12 col-md-4">
            <label class="form-label fw-semibold" th:text="#{main.invoice.daterange}">Zeitraum</label>
            <select class="form-select" id="invoiceview" th:field="*{invoiceview}"
                    onchange="updateDateVisibility()">
              <option value="month" th:text="#{main.general.timereport.view.monthly.text}">Monatsansicht</option>
              <option value="custom" th:text="#{main.general.timereport.view.custom.text}">Zeitraum</option>
            </select>

            <!-- Monthly mode: single month picker -->
            <div class="mt-2" id="month-picker"
                 th:classappend="*{invoiceview == 'custom'} ? 'd-none' : ''">
              <input type="month" class="form-control" th:field="*{fromYearMonth}">
            </div>

            <!-- Custom mode: date range -->
            <div class="mt-2" id="date-range-picker"
                 th:classappend="*{invoiceview != 'custom'} ? 'd-none' : ''">
              <div class="mb-2">
                <label class="form-label text-muted small" th:text="#{main.general.from.text}">von</label>
                <input type="date" class="form-control" th:field="*{fromDate}">
              </div>
              <div>
                <label class="form-label text-muted small" th:text="#{main.general.to.text}">bis</label>
                <input type="date" class="form-control" th:field="*{untilDate}">
              </div>
            </div>
          </div>

        </div>

        <!-- Advanced options toggle -->
        <div class="mt-2">
          <a class="text-muted small text-decoration-none" role="button"
             data-bs-toggle="collapse" href="#advanced-options" aria-expanded="false"
             aria-controls="advanced-options">
            <span th:text="#{main.invoice.advanced.text}">Erweitert</span>
            <span class="ms-1">▾</span>
          </a>
        </div>

        <!-- Collapsible advanced options -->
        <div class="collapse" id="advanced-options">
          <div class="row g-3 align-items-start mt-1">

            <!-- Auftragsbezeichnung -->
            <div class="col-12 col-md-4">
              <label class="form-label" th:text="#{main.invoice.suborderdescription.text}">Auftragsbezeichnung</label>
              <select class="form-select" id="suborderdescription" th:field="*{suborderdescription}">
                <option value="longdescription" th:text="#{main.invoice.suborderdescription.long.text}">Lang</option>
                <option value="shortdescription" th:text="#{main.invoice.suborderdescription.short.text}">Kurz</option>
              </select>
            </div>

            <!-- Content filters -->
            <div class="col-12 col-md-4 d-flex flex-column gap-2 justify-content-end">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="customeridbox" th:field="*{customeridbox}">
                <label class="form-check-label" for="customeridbox"
                       th:text="#{main.invoice.customersign.text}">Kundenkennungen verwenden</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="invoicebox" th:field="*{invoicebox}">
                <label class="form-check-label" for="invoicebox"
                       th:text="#{main.invoice.invoice.text}">Nicht fakturierbar</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="fixedpricebox" th:field="*{fixedpricebox}">
                <label class="form-check-label" for="fixedpricebox"
                       th:text="#{main.invoice.fixedprice.text}">Festpreis</label>
              </div>
            </div>

          </div>
        </div>

        <!-- Generate button on its own row -->
        <div class="row mt-3">
          <div class="col-12">
            <button type="submit" class="btn btn-primary"
                    th:text="#{main.invoice.button.createmaximumview.text}">Daten laden</button>
          </div>
        </div>

        </div>
      </div>

    <!-- ═══════════════════════════════════════════════════════════════
         PHASE 2 — Review & configure (only when data is loaded)
         ═══════════════════════════════════════════════════════════════ -->
    <div th:if="${invoiceData != null}">

      <!-- ─── 2A: Display options (client-side only, 3-column grid) ─── -->
      <div class="card mb-3">
        <div class="card-header">
          <h3 class="card-title mb-0" th:text="#{main.invoice.showhide.text}">Anzeige</h3>
        </div>
        <div class="card-body">
          <input type="hidden" name="timereportsbox" value="true">
          <div class="row g-3 align-items-center">

            <!-- Col 1: Mitarbeiternamen -->
            <div class="col-12 col-md-4">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="employeesignbox"
                       th:field="*{employeesignbox}" onchange="updateColumnVisibility()">
                <label class="form-check-label" for="employeesignbox"
                       th:text="#{main.invoice.employeesign.text}">Mitarbeiternamen</label>
              </div>
            </div>

            <!-- Col 2: Kommentare -->
            <div class="col-12 col-md-4">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="timereportdescriptionbox"
                       th:field="*{timereportdescriptionbox}" onchange="updateColumnVisibility()">
                <label class="form-check-label" for="timereportdescriptionbox"
                       th:text="#{main.invoice.timreportdescription.text}">Kommentare</label>
              </div>
            </div>

            <!-- Col 3: SOLL-Stunden -->
            <div class="col-12 col-md-4">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="targethoursbox"
                       th:field="*{targethoursbox}" onchange="updateColumnVisibility()">
                <label class="form-check-label" for="targethoursbox"
                       th:text="#{main.invoice.targethours.text}">SOLL-Stunden</label>
              </div>
            </div>

          </div>
          <p class="text-muted small mt-2 mb-0">
            Spaltenüberschriften können direkt in der Tabellenkopfzeile bearbeitet werden.
          </p>
        </div>
      </div>

      <!-- ─── 2B: Entry selection table ─── -->
      <div class="card mb-3">
        <div class="card-header d-flex justify-content-between align-items-center">
          <h3 class="card-title mb-0">Einträge</h3>
          <div class="btn-group btn-group-sm">
            <button type="button" class="btn btn-outline-secondary" onclick="selectAll()">Alle</button>
            <button type="button" class="btn btn-outline-secondary" onclick="deselectAll()">Keine</button>
          </div>
        </div>
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover mb-0">
              <thead>
                <tr>
                  <th class="col-selection" style="width: 2.5rem"></th>
                  <th class="col-suborder">
                    <input type="text" class="form-control form-control-sm" th:field="*{titlesubordertext}">
                  </th>
                  <th class="col-date">
                    <input type="text" class="form-control form-control-sm" th:field="*{titledatetext}">
                  </th>
                  <th class="col-employee">
                    <input type="text" class="form-control form-control-sm" th:field="*{titleemployeesigntext}">
                  </th>
                  <th class="col-description">
                    <input type="text" class="form-control form-control-sm" th:field="*{titledescriptiontext}">
                  </th>
                  <th class="col-budget">
                    <input type="text" class="form-control form-control-sm" th:field="*{titletargethourstext}">
                  </th>
                  <th class="col-duration">
                    <input type="text" class="form-control form-control-sm" th:field="*{titleactualdurationtext}">
                  </th>
                  <th class="col-hours">
                    <input type="text" class="form-control form-control-sm" th:field="*{titleactualhourstext}">
                  </th>
                </tr>
              </thead>
              <tbody>
                <th:block th:each="invoiceSuborder : ${invoiceData.suborders}">
                  <!-- Suborder row — full row is clickable -->
                  <tr class="invoice-row"
                      th:classappend="${!invoiceForm.suborderIdArray.contains(invoiceSuborder.id)} ? ' row-excluded' : ''"
                      th:attr="data-suborder-id=${invoiceSuborder.id}"
                      onclick="handleRowClick(event, this)">
                    <td class="col-selection align-middle">
                      <input class="form-check-input" type="checkbox" name="suborderIdArray"
                             th:value="${invoiceSuborder.id}"
                             th:checked="${invoiceForm.suborderIdArray.contains(invoiceSuborder.id)}"
                             onchange="toggleSuborder(this)">
                    </td>
                    <td class="col-suborder fw-bold align-middle"
                        th:text="${invoiceSuborder.orderDescription}"></td>
                    <td class="col-date"></td>
                    <td class="col-employee"></td>
                    <td class="col-description"></td>
                    <td class="col-budget text-end align-middle"
                        th:text="${invoiceSuborder.budget != null ? @durationUtils.format(invoiceSuborder.budget) : ''}"></td>
                    <td class="col-duration text-end align-middle"
                        th:text="${@durationUtils.format(invoiceSuborder.totalDuration)}"></td>
                    <td class="col-hours text-end align-middle"
                        th:text="${#numbers.formatDecimal(invoiceSuborder.totalHours, 1, 2)}"></td>
                  </tr>
                  <!-- Timereport rows — full row is clickable -->
                  <tr class="invoice-row"
                      th:each="invoiceTimereport : ${invoiceSuborder.timereports}"
                      th:classappend="${!invoiceForm.timereportIdArray.contains(invoiceTimereport.id)} ? ' row-excluded' : ''"
                      th:attr="data-parent-suborder=${invoiceSuborder.id},data-minutes=${invoiceTimereport.duration.toMinutes()}"
                      onclick="handleRowClick(event, this)">
                    <td class="col-selection align-middle">
                      <input class="form-check-input" type="checkbox" name="timereportIdArray"
                             th:value="${invoiceTimereport.id}"
                             th:checked="${invoiceForm.timereportIdArray.contains(invoiceTimereport.id)}"
                             onchange="toggleRowExclusion(this)">
                    </td>
                    <td class="col-suborder"></td>
                    <td class="col-date align-middle"
                        th:text="${#temporals.format(invoiceTimereport.referenceDay, 'dd.MM.yyyy')}"></td>
                    <td class="col-employee align-middle" th:text="${invoiceTimereport.employeeName}"></td>
                    <td class="col-description align-middle" th:text="${invoiceTimereport.taskDescription}"></td>
                    <td class="col-budget"></td>
                    <td class="col-duration text-end align-middle"
                        th:text="${@durationUtils.format(invoiceTimereport.duration)}"></td>
                    <td class="col-hours text-end align-middle"
                        th:text="${#numbers.formatDecimal(invoiceTimereport.hours, 1, 2)}"></td>
                  </tr>
                </th:block>
              </tbody>
              <tfoot th:attr="data-total-minutes=${invoiceData.totalDuration.toMinutes()}">
                <tr class="fw-bold">
                  <th class="col-selection"></th>
                  <th class="col-suborder text-end" th:text="#{main.invoice.overall.text}"></th>
                  <th class="col-date"></th>
                  <th class="col-employee"></th>
                  <th class="col-description"></th>
                  <th class="col-budget"></th>
                  <th class="col-duration text-end" id="footer-total-duration"
                      th:text="${@durationUtils.format(invoiceData.totalDurationVisible)}"></th>
                  <th class="col-hours text-end" id="footer-total-hours"
                      th:text="${#numbers.formatDecimal(invoiceData.totalHoursVisible, 1, 2)}"></th>
                </tr>
                <tr id="footer-gesamt-row"
                    th:classappend="${invoiceData.totalDurationVisible == invoiceData.totalDuration} ? 'd-none' : ''">
                  <td class="col-selection"></td>
                  <td class="col-suborder text-end text-secondary small">
                    <span th:text="#{main.invoice.overall.text}"></span> (gesamt)
                  </td>
                  <td class="col-date"></td>
                  <td class="col-employee"></td>
                  <td class="col-description"></td>
                  <td class="col-budget"></td>
                  <td class="col-duration text-end text-secondary">
                    (<span th:text="${@durationUtils.format(invoiceData.totalDuration)}"></span>)
                  </td>
                  <td class="col-hours text-end text-secondary">
                    (<span th:text="${#numbers.formatDecimal(invoiceData.totalHours, 1, 2)}"></span>)
                  </td>
                </tr>
              </tfoot>
            </table>
          </div>
        </div>
      </div>

      <!-- ─── 2C: Document & Export ─── -->
      <div class="card mb-3">
        <div class="card-header">
          <h3 class="card-title mb-0">Dokument &amp; Export</h3>
        </div>
        <div class="card-body">
          <p class="text-muted small mb-3">
            Geladener Zeitraum:
            <strong th:text="${#temporals.format(invoiceData.billingPeriod.from, 'dd.MM.yyyy')}"></strong>
            –
            <strong th:text="${#temporals.format(invoiceData.billingPeriod.until, 'dd.MM.yyyy')}"></strong>
          </p>
          <div class="row g-3 mb-3">
            <div class="col-12 col-md-4">
              <label class="form-label" th:text="#{main.invoice.addresshead.text}">Rechnungsanhang</label>
              <input type="text" class="form-control" th:field="*{titleinvoiceattachment}">
            </div>
            <div class="col-12 col-md-4">
              <label class="form-label" th:text="#{main.customerorder.customer.text}">Auftraggeber</label>
              <input type="text" class="form-control" th:field="*{customername}">
            </div>
            <div class="col-12 col-md-4">
              <label class="form-label">Adresse</label>
              <textarea class="form-control" th:field="*{customeraddress}" rows="4"></textarea>
            </div>
          </div>
          <div class="d-flex align-items-center gap-2 flex-wrap">
            <label class="form-label mb-0">Format:</label>
            <select id="invoice-settings-select" class="form-select w-auto">
              <option th:each="s : ${invoiceSettings}" th:value="${s.name}" th:text="${s.name}"></option>
            </select>
            <button type="button" class="btn btn-primary" onclick="submitPrint()"
                    th:text="#{main.general.button.printpreview.text}">Druckansicht</button>
            <button type="button" class="btn btn-secondary" onclick="submitExport()"
                    th:text="#{main.general.button.excelexport.new.text}">Excel-Export</button>
          </div>
        </div>
      </div>

    </div>

  </form>

  <script>
    // ── Date section visibility ─────────────────────────────────────────
    function updateDateVisibility() {
      const isCustom = document.getElementById('invoiceview').value === 'custom';
      document.getElementById('month-picker').classList.toggle('d-none', isCustom);
      document.getElementById('date-range-picker').classList.toggle('d-none', !isCustom);
    }

    // ── Column visibility (client-side, no server round-trip) ──────────
    function updateColumnVisibility() {
      const empEl  = document.getElementById('employeesignbox');
      const descEl = document.getElementById('timereportdescriptionbox');
      const budEl  = document.getElementById('targethoursbox');
      if (!empEl) return; // phase 2 not rendered yet

      setColVisible('col-employee',    empEl.checked);
      setColVisible('col-description', descEl.checked);
      setColVisible('col-budget',      budEl.checked);
    }

    function setColVisible(cls, visible) {
      document.querySelectorAll('.' + cls).forEach(el => {
        el.classList.toggle('col-hidden', !visible);
      });
    }

    // ── Row click: toggle checkbox by clicking anywhere on the row ──────
    function handleRowClick(event, row) {
      if (event.target.tagName === 'INPUT') return; // checkbox handles itself
      const cb = row.querySelector('input[name="suborderIdArray"], input[name="timereportIdArray"]');
      if (!cb) return;
      cb.checked = !cb.checked;
      if (cb.name === 'suborderIdArray') {
        toggleSuborder(cb);
      } else {
        toggleRowExclusion(cb);
      }
    }

    // ── Last visible row border ─────────────────────────────────────────
    function updateLastRowBorder() {
      ['tbody', 'tfoot'].forEach(section => {
        const el = document.querySelector(`#invoice-form ${section}`);
        if (!el) return;
        el.querySelectorAll('tr').forEach(r => r.classList.remove('invoice-last-row'));
        const visible = [...el.querySelectorAll('tfoot > tr:not(.d-none)')];
        if (visible.length) visible[visible.length - 1].classList.add('invoice-last-row');
      });
    }

    // ── Totals helpers ──────────────────────────────────────────────────
    function fmtDuration(minutes) {
      const h = Math.floor(Math.abs(minutes) / 60);
      const m = Math.abs(minutes) % 60;
      return (minutes < 0 ? '-' : '') + h + ':' + String(m).padStart(2, '0');
    }

    function fmtHours(minutes) {
      return (minutes / 60).toFixed(2).replace('.', ',');
    }

    function recomputeTotals() {
      let grandMinutes = 0;

      document.querySelectorAll('tr[data-suborder-id]').forEach(suborderRow => {
        const suborderId = suborderRow.dataset.suborderId;
        let suborderMinutes = 0;
        document.querySelectorAll(`tr[data-parent-suborder="${suborderId}"] input[name="timereportIdArray"]`).forEach(cb => {
          if (cb.checked) {
            suborderMinutes += parseInt(cb.closest('tr').dataset.minutes || '0', 10);
          }
        });
        suborderRow.querySelector('.col-duration').textContent = fmtDuration(suborderMinutes);
        suborderRow.querySelector('.col-hours').textContent = fmtHours(suborderMinutes);
        grandMinutes += suborderMinutes;
      });

      document.getElementById('footer-total-duration').textContent = fmtDuration(grandMinutes);
      document.getElementById('footer-total-hours').textContent = fmtHours(grandMinutes);

      const totalMinutes = parseInt(document.querySelector('tfoot').dataset.totalMinutes || '0', 10);
      document.getElementById('footer-gesamt-row').classList.toggle('d-none', grandMinutes === totalMinutes);
    }

    // ── Row exclusion feedback ──────────────────────────────────────────
    function toggleRowExclusion(checkbox) {
      checkbox.closest('tr').classList.toggle('row-excluded', !checkbox.checked);
      recomputeTotals();
      updateLastRowBorder();
    }

    function toggleSuborder(checkbox) {
      const row = checkbox.closest('tr');
      row.classList.toggle('row-excluded', !checkbox.checked);
      document.querySelectorAll(`tr[data-parent-suborder="${row.dataset.suborderId}"]`).forEach(trRow => {
        const cb = trRow.querySelector('input[name="timereportIdArray"]');
        if (cb) {
          cb.checked = checkbox.checked;
          trRow.classList.toggle('row-excluded', !checkbox.checked);
        }
      });
      recomputeTotals();
      updateLastRowBorder();
    }

    // ── Bulk select / deselect ──────────────────────────────────────────
    function selectAll() {
      document.querySelectorAll(
        'input[name="timereportIdArray"], input[name="suborderIdArray"]'
      ).forEach(cb => {
        cb.checked = true;
        cb.closest('tr').classList.remove('row-excluded');
      });
      recomputeTotals();
      updateLastRowBorder();
    }

    function deselectAll() {
      document.querySelectorAll(
        'input[name="timereportIdArray"], input[name="suborderIdArray"]'
      ).forEach(cb => {
        cb.checked = false;
        cb.closest('tr').classList.add('row-excluded');
      });
      recomputeTotals();
      updateLastRowBorder();
    }

    // ── Form submission ─────────────────────────────────────────────────
    function submitUpdate() {
      const form = document.getElementById('invoice-form');
      form.action = /*[[@{/invoice}]]*/ '/invoice';
      form.submit();
    }

    function submitPrint() {
      const form = document.getElementById('invoice-form');
      const settingsValue = document.getElementById('invoice-settings-select').value;
      let hidden = document.getElementById('invoice-settings-hidden');
      if (!hidden) {
        hidden = document.createElement('input');
        hidden.type = 'hidden';
        hidden.id = 'invoice-settings-hidden';
        hidden.name = 'invoice-settings';
        form.appendChild(hidden);
      }
      hidden.value = settingsValue;
      form.target = '_blank';
      form.action = '[[@{/invoice/print}]]';
      form.submit();
      form.target = '_self';
      form.action = '[[@{/invoice/generate}]]';
    }

    function submitExport() {
      const form = document.getElementById('invoice-form');
      form.target = '_self';
      form.action = '[[@{/invoice/export}]]';
      form.submit();
      form.action = '[[@{/invoice/generate}]]';
    }

    // ── Initialize on page load ─────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {
      updateColumnVisibility();
      updateLastRowBorder();
    });
  </script>

</main>
</html>
