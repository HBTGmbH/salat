<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:salat="http://hbt.de/salat/thymeleaf"
      layout:decorate="~{layout/base}">

<head>
  <title th:text="#{main.settings.title}">Settings</title>
</head>

<body>

<main layout:fragment="content">

  <salat:form th:action="@{/settings/store}" th:object="${settingsForm}">
    <salat:inputs>
      <salat:textInput type="time"
                       th:field="*{workDayStart}"
                       th:label="#{main.settings.workdaystart.label}"
                       required="true" />

      <div class="mb-3">
        <label class="form-label"
               for="favoriteSuborderId"
               th:text="#{main.settings.timereport.favorite.label}">Bevorzugter Unterauftrag</label>
        <select class="form-select tomselect"
                id="favoriteSuborderId"
                name="favoriteSuborderId">
          <option value="" th:text="#{main.settings.timereport.favorite.none}">— Kein Favorit —</option>
          <option th:each="s : ${suborders}"
                  th:value="${s.id}"
                  th:text="${s.label}"
                  th:attr="data-subtext=${s.subtext}"
                  th:selected="${settingsForm.favoriteSuborderId != null and settingsForm.favoriteSuborderId == s.id.toString()}"></option>
        </select>
        <small id="favoriteSuborderId-subtext" class="form-text text-muted mt-1"></small>
      </div>

    </salat:inputs>
    <salat:buttons>
      <salat:formButtons th:saveLabel="#{main.button.save}" th:cancelHref="@{/}" />
    </salat:buttons>
  </salat:form>

</main>

</body>

</html>
