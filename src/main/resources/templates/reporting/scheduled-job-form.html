<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}"
      th:with="section='reports',subSection='scheduled-report-jobs',title=${pageTitle},sectionTitle=#{main.general.mainmenu.reporting.text}">
<main layout:fragment="content">
  <div class="card">
    <div class="card-body">
      <form th:action="@{/reporting/jobs/store}" th:object="${job}" method="post">

        <input type="hidden" th:field="*{id}" />

        <div th:replace="~{fragments/form-fields :: textInput(
          params=${#ffield.required('name', 255)}, label='Job Name'
        )}"></div>

        <div th:replace="~{fragments/form-fields :: selectInput(
          params=${#ffield.requiredSelect('reportDefinitionId', reportDefinitions, 'id', 'name')},
          label='Report', placeholder='-- Select Report --'
        )}"></div>

        <div th:replace="~{fragments/form-fields :: textareaInput(
          params=${#ffield.codeWithHelp('reportParameters', 5, 'Example: {&quot;startDate&quot;: &quot;2024-01-01&quot;, &quot;endDate&quot;: &quot;2024-12-31&quot;}')},
          label='Report Parameters (JSON)'
        )}"></div>

        <div th:replace="~{fragments/form-fields :: textareaInput(
          params=${#ffield.requiredTextareaWithHelp('recipientEmails', 3, 'Comma or semicolon separated email addresses')},
          label='Recipient Emails'
        )}"></div>

        <div th:replace="~{fragments/form-fields :: checkboxSwitch(
          field='enabled', label='Enabled'
        )}"></div>

        <div th:replace="~{fragments/form-fields :: textInput(
          params=${#ffield.text('cronExpression', 255, 'Leave empty for default schedule (Daily at 5:00 AM)')},
          label='Cron Expression (optional)'
        )}"></div>

        <div th:replace="~{fragments/form-fields :: textareaInput(
          params=${#ffield.textarea('description', 3)}, label='Description'
        )}"></div>

        <div th:replace="~{fragments/form-fields :: formButtons(
          saveLabel='Save Scheduled Job', cancelHref=@{/reporting/jobs}
        )}"></div>

      </form>
    </div>
  </div>
  <div class="card mt-4" th:if="${scheduledTask != null}">
    <div class="card-body">
      <h3>Next execution</h3>
      <p th:text="${#temporals.format(scheduledTask.nextExecution, 'yyyy-MM-dd HH:mm:ss')}">2024-01-01 05:00:00</p>
    </div>
  </div>
</main>
</html>
