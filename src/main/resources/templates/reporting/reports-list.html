<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}"
      th:with="section='reports',subSection='reports',title='Reports',sectionTitle=#{main.general.mainmenu.reporting.text}">
<main layout:fragment="content">

  <div th:replace="~{fragments/master-table :: table(
      _headerRow = ~{::_headerRow},
      _bodyRows = ~{::_bodyRows},
      _addButtonLabel = 'New Report',
      _addButtonHref = @{'/reporting/reports/create'(filter=${filter})},
      _filterEnabled = ${#authorization.expression('hasRole(''MANAGER'')')},
      _filterHref=@{/reporting/reports},
      _filterValue=${filter}
    )}">

    <th:block th:fragment="_headerRow">
      <tr>
        <th th:replace="~{fragments/master-table :: header(_label='Name', _responsive=true)}"></th>
        <th th:replace="~{fragments/master-table :: header(_label='Last Updated')}"></th>
        <th th:replace="~{fragments/master-table :: header(_label='Last Updated By')}"></th>
        <th th:replace="~{fragments/master-table :: header(_responsive=true)}"></th>
        <th th:replace="~{fragments/master-table :: header(_responsive=true)}"></th>
        <th th:replace="~{fragments/master-table :: header(_responsive=true)}"></th>
      </tr>
    </th:block>

    <th:block th:fragment="_bodyRows">
      <tr th:each="report : ${reports}">
        <td th:replace="~{fragments/master-table :: text(_value=${report.name}, _responsive=true)}"></td>
        <td th:replace="~{fragments/master-table :: date(_date=${report.lastupdate})}"></td>
        <td th:replace="~{fragments/master-table :: text(_value=${report.lastupdatedby})}"></td>
        <td th:replace="~{fragments/master-table :: action(
          _href=@{'/reporting/reports/execute'(id=${report.id}, filter=${filter})},
          _enabled=mayEdit[report.id],
          _btnClass='btn-success',
          _icon='ti-player-play')}">
        </td>
        <td th:replace="~{fragments/master-table :: editAction(_href=@{'/reporting/reports/edit'(id=${report.id}, filter=${filter})}, _enabled=mayEdit[report.id])}"></td>
        <td th:replace="~{fragments/master-table :: deleteAction(_href=@{'/reporting/reports/delete'(id=${report.id}, filter=${filter})}, _enabled=mayDelete[report.id])}"></td>
      </tr>
    </th:block>

  </div>

</main>
</html>
