<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}"
      th:with="section='employees',subSection='employees',title=${pageTitle},sectionTitle=${sectionTitle}">
<main layout:fragment="content">

  <div class="card mb-3">
    <div class="card-body">
      <form method="get" th:action="@{/employees}" data-filter-form="em">

        <!-- Primary filter row -->
        <div class="row g-2 align-items-end">
          <div class="col-md-6">
            <input type="text" class="form-control" name="filter" th:value="${filter}" />
          </div>
          <div class="col-auto">
            <button type="submit" class="btn btn-primary"><i class="icon ti ti-filter m-0"></i></button>
          </div>
          <div class="col-auto ms-auto" th:if="${#authorization.expression('hasRole(''MANAGER'')')}">
            <a th:href="@{/employees/create}" class="btn btn-success">
              <i class="icon ti ti-user-plus"></i>
              <span th:text="#{main.general.button.createemployee.text}">Create Employee</span>
            </a>
          </div>
        </div>

        <!-- Advanced toggle -->
        <div class="mt-2">
          <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" id="advanced-toggle" role="switch">
            <label class="form-check-label text-muted small" th:text="#{main.general.filter.advanced.text}">Advanced Filter</label>
          </div>
        </div>
        <button type="button" class="d-none" id="advanced-collapse-trigger"
                data-bs-toggle="collapse" data-bs-target="#advanced-filters"></button>

        <!-- Advanced filters -->
        <div class="collapse mt-3" id="advanced-filters">
          <div class="row g-2 align-items-end mt-2">
            <div class="col-auto ms-2">
              <label class="form-check form-switch">
                <input class="form-check-input" type="checkbox" name="showHidden" value="true" th:checked="${showHidden}"/>
                <span class="form-check-label" th:text="#{main.general.showhidden.text}">Show hidden</span>
              </label>
            </div>
          </div>
        </div>

      </form>
    </div>
  </div>

  <div class="card">
    <div class="table-responsive">
      <table class="table table-vcenter card-table">
        <thead>
          <tr>
            <th th:title="#{main.headlinedescription.employees.lastname.text}" th:text="#{main.employee.lastname.text}">Last Name</th>
            <th th:title="#{main.headlinedescription.employees.fristname.text}" th:text="#{main.employee.firstname.text}">First Name</th>
            <th class="d-none d-md-table-cell" th:title="#{main.headlinedescription.employees.sign.text}" th:text="#{main.employee.sign.text}">Sign</th>
            <th class="d-none d-md-table-cell" th:title="#{main.headlinedescription.employees.loginname.text}" th:text="#{main.employee.loginname.text}">Login</th>
            <th class="d-none d-md-table-cell" th:title="#{main.headlinedescription.employees.status.text}" th:text="#{main.employee.status.text}">Status</th>
            <th class="d-none d-lg-table-cell" th:text="#{main.general.flags.text}">Flags</th>
            <th th:if="${#authorization.expression('hasRole(''MANAGER'')')}" class="w-1"></th>
            <th th:if="${#authorization.expression('hasRole(''MANAGER'')')}" class="w-1"></th>
          </tr>
        </thead>
        <tbody>
          <tr th:if="${#lists.isEmpty(employees)}">
            <td colspan="8" class="text-center text-muted py-4" th:text="#{main.general.norecords.text}">No employees found</td>
          </tr>
          <tr th:each="employee : ${employees}">
            <td th:text="${employee.lastname}"></td>
            <td th:text="${employee.firstname}"></td>
            <td class="d-none d-md-table-cell" th:text="${employee.sign}"></td>
            <td class="d-none d-md-table-cell" th:text="${employee.loginname}"></td>
            <td class="d-none d-md-table-cell" th:text="#{${'main.employee.status.' + employee.status}}"></td>
            <td class="d-none d-lg-table-cell">
              <span th:if="${employee.hide}" class="badge bg-secondary-lt" th:title="#{main.general.hide}"><i class="bi bi-eye-slash"></i></span>
            </td>
            <td th:if="${#authorization.expression('hasRole(''MANAGER'')')}">
              <a th:href="@{/employees/edit(id=${employee.id})}" class="btn btn-outline-primary"
                 th:title="#{main.headlinedescription.employees.edit.text}">
                <i class="icon ti ti-pencil m-0"></i>
              </a>
            </td>
            <td th:if="${#authorization.expression('hasRole(''MANAGER'')')}">
              <form th:action="@{/employees/{id}/delete(id=${employee.id})}" method="post"
                    th:onsubmit="|return confirm('#{main.general.confirmdelete.text}')|">
                <button type="submit" class="btn btn-outline-danger"
                        th:title="#{main.headlinedescription.employees.delete.text}">
                  <i class="icon ti ti-trash m-0"></i>
                </button>
              </form>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>


  <script th:inline="none">
    document.addEventListener('DOMContentLoaded', function () {
      const form = document.querySelector('form[data-filter-form]');
      if (!form) return;

      const STORAGE_KEY = form.dataset.filterForm + '-advanced-open';
      const toggleInput = document.getElementById('advanced-toggle');
      const panel = document.getElementById('advanced-filters');
      const collapseTrigger = document.getElementById('advanced-collapse-trigger');
      if (!toggleInput || !panel || !collapseTrigger) return;

      const serverOpen = panel.dataset.serverOpen === 'true';
      const localOpen = localStorage.getItem(STORAGE_KEY) === 'true';
      if (serverOpen || localOpen) {
        panel.classList.add('show');
        toggleInput.checked = true;
      }

      toggleInput.addEventListener('change', function () {
        collapseTrigger.click();
      });

      panel.addEventListener('show.bs.collapse', function () {
        toggleInput.checked = true;
        localStorage.setItem(STORAGE_KEY, 'true');
      });
      panel.addEventListener('hide.bs.collapse', function () {
        toggleInput.checked = false;
        localStorage.setItem(STORAGE_KEY, 'false');
      });

      form.querySelectorAll('select, input[type="checkbox"][name]').forEach(function (el) {
        el.addEventListener('change', function () { form.requestSubmit(); });
      });
    });
  </script>

</main>
</html>
