<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}"
      th:with="section='employees',subSection='employees',title=${pageTitle},sectionTitle=${sectionTitle}">
<main layout:fragment="content">

  <form th:action="@{/employees/store}" th:object="${employeeForm}" method="post" class="card">
    <div class="card-body">
      <input type="hidden" th:field="*{id}" />
      
        <div>
          <div th:replace="~{fragments/form-fields :: textInput(
            field='firstname', label=#{main.employee.firstname.text}, required=true, maxlength=255
          )}"></div>
        </div>
        <div>
          <div th:replace="~{fragments/form-fields :: textInput(
            field='lastname', label=#{main.employee.lastname.text}, required=true, maxlength=255
          )}"></div>
        </div>
        <div>
          <div class="mb-3">
            <label class="form-label required" th:for="gender" th:text="#{main.employee.gender.text}">Gender</label>
            <select class="form-select" id="gender" th:field="*{gender}" th:errorclass="is-invalid">
              <option value="m" th:text="#{main.general.employee.gender.male}">Male</option>
              <option value="f" th:text="#{main.general.employee.gender.female}">Female</option>
            </select>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('gender')}" th:errors="*{gender}"></div>
          </div>
        </div>
      
        <div>
          <div th:replace="~{fragments/form-fields :: textInput(
            field='sign', label=#{main.employee.sign.text}, required=true, maxlength=5
          )}"></div>
        </div>
      
        <div>
          <div th:replace="~{fragments/form-fields :: textInput(
            field='loginname', label=#{main.employee.loginname.text}, required=true, maxlength=5
          )}"></div>
        </div>
        <div>
          <div class="mb-3">
            <label class="form-label required" th:for="status" th:text="#{main.employee.status.text}">Status</label>
            <select class="form-select" id="status" th:field="*{status}" th:errorclass="is-invalid">
              <option value="ma" th:text="#{main.employee.status.ma}">ma</option>
              <option value="restricted" th:text="#{main.employee.status.restricted}">restricted</option>
              <option value="pv" th:text="#{main.employee.status.pv}">pv</option>
              <option value="bo" th:text="#{main.employee.status.bo}">bo</option>
              <option value="bl" th:text="#{main.employee.status.bl}">bl</option>
              <option value="adm" th:text="#{main.employee.status.adm}">adm</option>
            </select>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('status')}" th:errors="*{status}"></div>
          </div>
        </div>

        <div>
          <div th:replace="~{fragments/form-fields :: checkboxSwitch(
            field='hide', label=#{main.general.hide}
          )}"></div>
        </div>

    </div>

    <div class="card-footer">
      <div th:with="saveLabel=${isEdit} ? #{main.general.button.save.text} : #{main.general.button.create.text}"
           th:replace="~{fragments/form-fields :: formButtons(
             saveLabel=${saveLabel},
             cancelHref=@{/employees}
           )}"></div>
    </div>
  </form>

  <!-- Anonymize danger zone (edit only) -->
  <div th:if="${isEdit}" class="card mt-3 border-danger">
    <div class="card-header">
      <h4 class="card-title text-danger" th:text="#{form.employee.anonymize.dangerzone.title}">Danger Zone</h4>
    </div>
    <div class="card-body">
      <p class="text-muted" th:text="#{form.employee.anonymize.dangerzone.description}">Anonymize all personal data of this employee. This action cannot be undone.</p>
      <button type="button" class="btn btn-danger"
              data-bs-toggle="modal" data-bs-target="#anonymizeModal"
              th:text="#{form.employee.anonymize.button}">Anonymize Employee</button>
    </div>
  </div>

  <!-- Anonymize confirmation modal -->
  <div th:if="${isEdit}" class="modal modal-blur fade" id="anonymizeModal" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog modal-sm modal-dialog-centered" role="document">
      <div class="modal-content">
        <form th:action="@{/employees/{id}/anonymize(id=${employeeForm.id})}" method="post"
              id="anonymizeForm" th:attr="data-employee-sign=${employeeForm.sign}">
          <div class="modal-header">
            <h5 class="modal-title" th:text="#{form.employee.anonymize.modal.title}">Anonymize Employee</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <div class="alert alert-danger" role="alert">
              <div class="d-flex">
                <div>
                  <i class="bi bi-exclamation-triangle-fill me-2"></i>
                </div>
                <div th:text="#{form.employee.anonymize.modal.warning}">This will irreversibly overwrite all personal data. This action cannot be undone.</div>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label required" for="confirmSign1" th:text="#{form.employee.anonymize.modal.sign1.label}">Enter employee sign</label>
              <input type="text" class="form-control" id="confirmSign1" autocomplete="off" />
            </div>
            <div class="mb-3">
              <label class="form-label required" for="confirmSign2" th:text="#{form.employee.anonymize.modal.sign2.label}">Confirm employee sign</label>
              <input type="text" class="form-control" name="confirmSign" id="confirmSign2" autocomplete="off" />
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-link link-secondary me-auto"
                    data-bs-dismiss="modal" th:text="#{main.general.button.cancel.text}">Cancel</button>
            <button type="submit" class="btn btn-danger" id="anonymizeSubmitBtn" disabled
                    th:text="#{form.employee.anonymize.modal.submit}">Anonymize</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script th:if="${isEdit}">
    (function () {
      var form = document.getElementById('anonymizeForm');
      if (!form) return;
      var sign = form.getAttribute('data-employee-sign');
      var input1 = document.getElementById('confirmSign1');
      var input2 = document.getElementById('confirmSign2');
      var btn = document.getElementById('anonymizeSubmitBtn');
      function check() {
        btn.disabled = !(input1.value === sign && input2.value === sign);
      }
      input1.addEventListener('input', check);
      input2.addEventListener('input', check);
      document.getElementById('anonymizeModal').addEventListener('show.bs.modal', function () {
        input1.value = '';
        input2.value = '';
        btn.disabled = true;
      });
    })();
  </script>

</main>
</html>
